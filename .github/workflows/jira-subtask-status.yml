name: Jira - Subtask Status Automation

# Smart parent-subtask workflow:
#   Parent WITH subtasks: To Do → In Progress (first push) only. No Review/Staging/Production.
#   Parent WITHOUT subtasks: To Do → In Progress (first push) → Review (PR opened) → Staging (PR merged) → Production (deploy) → Done
#   Subtask: To Do → In Progress (manual) → Review (auto: PR opened) → Staging (auto: PR merged)
#     → Production (auto: deploy/workflow_dispatch) → Done (manual)
#   First push to any branch → story → In Progress (always, with or without subtasks)

on:
  push:
    branches:
      - 'feature/**'
      - '[A-Z][A-Z]*-[0-9]*'
  pull_request:
    types: [closed]
    branches:
      - develop
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - production
      subtask_keys:
        description: 'Subtask keys (comma separated, e.g. PROJ-61,PROJ-62).'
        required: true
        type: string

jobs:

  # --- On Commit: Move parent to In Progress (first push to feature branch) ---
  on-commit:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Move parent to In Progress on first push
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          IN_PROGRESS_TRANSITION_ID: ${{ vars.JIRA_TRANSITION_IN_PROGRESS || '21' }}
          BRANCH: ${{ github.ref_name }}
        run: |
          PARENT_KEY=$(echo "$BRANCH" | grep -oE '[A-Z]+-[0-9]+' | head -1)

          if [ -z "$PARENT_KEY" ]; then
            echo "No Jira key found in branch: $BRANCH"
            exit 0
          fi

          SUBTASK_COUNT=$(curl -s -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            "$JIRA_BASE_URL/rest/api/3/issue/$PARENT_KEY?fields=subtasks" \
            | jq '.fields.subtasks | length // 0')

          echo "Branch: $BRANCH | Issue: $PARENT_KEY | Subtasks: $SUBTASK_COUNT"

          # Always move to In Progress on first push (both standalone stories and parents with subtasks)
          echo "Moving $PARENT_KEY to In Progress (idempotent)"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"transition\":{\"id\":\"$IN_PROGRESS_TRANSITION_ID\"}}" \
            "$JIRA_BASE_URL/rest/api/3/issue/$PARENT_KEY/transitions")

          if [ "$HTTP_CODE" = "204" ]; then
            echo "  -> $PARENT_KEY → In Progress"
          else
            echo "  -> $PARENT_KEY → In Progress skipped/failed (HTTP $HTTP_CODE)"
          fi

  # --- On PR Merge to develop: Move referenced subtasks to Staging + Slack ---
  on-pr-merge:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo for commit history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move only referenced subtasks to Staging
        id: staging
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          STAGING_TRANSITION_ID: ${{ vars.JIRA_TRANSITION_STAGING || '2' }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_NUM: ${{ github.event.pull_request.number }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
        run: |
          PARENT_KEY=$(echo "$BRANCH" | grep -oE '[A-Z]+-[0-9]+' | head -1)

          if [ -z "$PARENT_KEY" ]; then
            echo "No Jira key found in branch: $BRANCH"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Parent: $PARENT_KEY"
          echo "Branch: $BRANCH"

          # Collect all Jira keys mentioned in PR title, body, and commit messages
          COMMIT_MSGS=$(git log --format=%s "$MERGE_SHA"^1.."$MERGE_SHA"^2 2>/dev/null || echo "")
          ALL_TEXT="${PR_TITLE} ${PR_BODY} ${COMMIT_MSGS}"
          MENTIONED_KEYS=$(echo "$ALL_TEXT" | grep -oE '[A-Z]+-[0-9]+' | sort -u | tr '\n' ' ')
          echo "Keys mentioned in PR: $MENTIONED_KEYS"

          TRANSITIONED_KEYS=""

          # Check if parent has subtasks
          SUBTASK_COUNT=$(curl -s -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            "$JIRA_BASE_URL/rest/api/3/issue/$PARENT_KEY?fields=subtasks" \
            | jq '.fields.subtasks | length // 0')

          # Build safe Jira comment body
          build_comment() {
            jq -n \
              --arg pr "PR #${PR_NUM} merged to develop by ${MERGED_BY}" \
              --arg title "Title: ${PR_TITLE}" \
              --arg status "Status: Deployed to Staging" \
              '{body:{type:"doc",version:1,content:[{type:"paragraph",content:[{type:"text",text:$pr},{type:"hardBreak"},{type:"text",text:$title},{type:"hardBreak"},{type:"text",text:$status}]}]}}'
          }

          if [ "$SUBTASK_COUNT" -gt 0 ] 2>/dev/null; then
            # Parent has subtasks — only move subtasks that were mentioned in PR
            JQL=$(python3 -c "import urllib.parse; print(urllib.parse.quote('parent=$PARENT_KEY'))")
            SUBTASKS=$(curl -s -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              "$JIRA_BASE_URL/rest/api/3/search/jql?jql=${JQL}&fields=status,summary")

            echo "$SUBTASKS" | jq -r '.issues[] | .key' | while read KEY; do
              if echo "$MENTIONED_KEYS" | grep -qw "$KEY"; then
                HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                  -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "{\"transition\":{\"id\":\"$STAGING_TRANSITION_ID\"}}" \
                  "$JIRA_BASE_URL/rest/api/3/issue/$KEY/transitions")

                if [ "$HTTP_CODE" = "204" ]; then
                  echo "  -> $KEY → Staging"
                fi
              fi
            done

            # Add Jira comment for each mentioned subtask
            COMMENT_BODY=$(build_comment)

            for KEY in $MENTIONED_KEYS; do
              if [ "$KEY" = "$PARENT_KEY" ]; then
                continue
              fi
              curl -s -o /dev/null \
                -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
                -H "Content-Type: application/json" \
                -X POST \
                "$JIRA_BASE_URL/rest/api/3/issue/$KEY/comment" \
                -d "$COMMENT_BODY"
            done

            TRANSITIONED_KEYS="$MENTIONED_KEYS"
            echo "Skipping parent $PARENT_KEY (has subtasks — only uses To Do / In Progress)"
          else
            # Standalone story (no subtasks) — move to Staging
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"transition\":{\"id\":\"$STAGING_TRANSITION_ID\"}}" \
              "$JIRA_BASE_URL/rest/api/3/issue/$PARENT_KEY/transitions")

            if [ "$HTTP_CODE" = "204" ]; then
              echo "  -> $PARENT_KEY → Staging (standalone issue, no subtasks)"
            else
              echo "  -> $PARENT_KEY failed (HTTP $HTTP_CODE)"
            fi

            # Add Jira comment
            COMMENT_BODY=$(build_comment)

            curl -s -o /dev/null \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Content-Type: application/json" \
              -X POST \
              "$JIRA_BASE_URL/rest/api/3/issue/$PARENT_KEY/comment" \
              -d "$COMMENT_BODY"

            TRANSITIONED_KEYS="$PARENT_KEY"
          fi

          echo "keys=${TRANSITIONED_KEYS}" >> "$GITHUB_OUTPUT"
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Notify Slack - Staging deployment
        if: steps.staging.outputs.found == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.STAGING_SLACK_WEBHOOK_URL }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          ISSUE_KEYS: ${{ steps.staging.outputs.keys }}
          REPO_NAME: ${{ github.repository }}
        run: |
          IST_TIME=$(TZ='Asia/Kolkata' date "+%b %d, %Y %I:%M %p IST")
          UTC_TIME=$(date -u "+%b %d, %Y %I:%M %p UTC")

          # Build Jira links
          JIRA_LINKS=""
          for KEY in $ISSUE_KEYS; do
            JIRA_LINKS+="<${JIRA_BASE_URL}/browse/${KEY}|${KEY}> "
          done

          REPO_URL="https://github.com/${REPO_NAME}"

          # Use printf to create actual newlines (jq --arg treats \n as literal)
          REPO_FIELD=$(printf '*Repository:*\n<%s|%s>' "$REPO_URL" "$REPO_NAME")
          PR_FIELD=$(printf '*PR:*\n<%s|#%s %s>' "$PR_URL" "$PR_NUM" "$PR_TITLE")
          BRANCH_FIELD=$(printf '*Branch:*\n`%s`' "$BRANCH")
          MERGED_FIELD=$(printf '*Merged by:*\n%s' "$MERGED_BY")
          JIRA_FIELD=$(printf '*Jira Issues:*\n%s' "$JIRA_LINKS")
          STATUS_FIELD=$(printf '*Status:*\n`STAGING`')

          PAYLOAD=$(jq -n \
            --arg repo_field "$REPO_FIELD" \
            --arg pr_field "$PR_FIELD" \
            --arg branch_field "$BRANCH_FIELD" \
            --arg merged_field "$MERGED_FIELD" \
            --arg jira_field "$JIRA_FIELD" \
            --arg status_field "$STATUS_FIELD" \
            --arg context "${IST_TIME}  |  ${UTC_TIME}" \
            --arg pr_url "$PR_URL" \
            '{blocks:[
              {type:"header",text:{type:"plain_text",text:"Deployed to Staging"}},
              {type:"section",text:{type:"mrkdwn",text:"*PR merged to develop - moved to Staging*"}},
              {type:"divider"},
              {type:"section",fields:[
                {type:"mrkdwn",text:$repo_field},
                {type:"mrkdwn",text:$pr_field},
                {type:"mrkdwn",text:$branch_field},
                {type:"mrkdwn",text:$merged_field},
                {type:"mrkdwn",text:$jira_field},
                {type:"mrkdwn",text:$status_field}
              ]},
              {type:"divider"},
              {type:"context",elements:[{type:"mrkdwn",text:$context}]},
              {type:"actions",elements:[{type:"button",text:{type:"plain_text",text:"View PR"},url:$pr_url}]}
            ]}')

          curl -s -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$SLACK_WEBHOOK_URL"

  # --- On Production Deploy: Move specified subtasks to Production → Done ---
  on-deploy-prod:
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy_env == 'production'
    runs-on: ubuntu-latest
    steps:
      - name: Move subtasks to Production then Done, check parent completion
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          PRODUCTION_TRANSITION_ID: ${{ vars.JIRA_TRANSITION_PRODUCTION || '3' }}
          SUBTASK_KEYS: ${{ github.event.inputs.subtask_keys }}
        run: |
          if [ -z "$SUBTASK_KEYS" ]; then
            echo "No subtask keys provided. Nothing to do."
            exit 0
          fi

          echo "Releasing subtasks: $SUBTASK_KEYS"

          PARENT_KEYS=""

          IFS=',' read -ra KEYS <<< "$SUBTASK_KEYS"

          for KEY in "${KEYS[@]}"; do
            KEY=$(echo "$KEY" | xargs)
            [ -z "$KEY" ] && continue

            # Validate Jira key format
            if ! echo "$KEY" | grep -qE '^[A-Z]+-[0-9]+$'; then
              echo "  -> Skipping invalid key: $KEY"
              continue
            fi

            echo "--- $KEY ---"

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"transition\":{\"id\":\"$PRODUCTION_TRANSITION_ID\"}}" \
              "$JIRA_BASE_URL/rest/api/3/issue/$KEY/transitions")

            if [ "$HTTP_CODE" = "204" ]; then
              echo "  -> $KEY → Production (manual Done required)"
            else
              echo "  -> $KEY → Production failed (HTTP $HTTP_CODE)"
            fi
          done
