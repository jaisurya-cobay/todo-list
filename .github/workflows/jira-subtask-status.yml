name: Jira Subtask Status Automation

# Subtask status auto-move based on commit keywords
# Developer commit convention:
#   "XPRMNTS-XX started ..." → To Do → In Progress
#   "XPRMNTS-XX completed ..." → In Progress → Code Review
# PR merge → all subtasks → QA (Staging)
# Production deploy → all subtasks → Prod → Done

on:
  push:
    branches:
      - 'feature/**'
  pull_request:
    types: [closed]
    branches:
      - master
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - production
      subtask_keys:
        description: 'Subtask keys to release (comma separated, e.g. XPRMNTS-61,XPRMNTS-62). Leave empty for ALL subtasks.'
        required: false
        type: string

jobs:

  # ─── On Commit: Move individual subtasks based on keywords ───
  on-commit:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Process commits for subtask status
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          move_issue() {
            local KEY=$1
            local TARGET_STATUS=$2
            local TRANSITION_ID=$3

            echo "  Moving $KEY → $TARGET_STATUS (transition: $TRANSITION_ID)..."

            RESULT=$(curl -s -w "\n%{http_code}" -X POST \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"transition\":{\"id\":\"$TRANSITION_ID\"}}" \
              "$JIRA_BASE_URL/rest/api/3/issue/$KEY/transitions")

            HTTP_CODE=$(echo "$RESULT" | tail -1)
            BODY=$(echo "$RESULT" | sed '$d')

            if [ "$HTTP_CODE" = "204" ]; then
              echo "  ✅ $KEY → $TARGET_STATUS"
            else
              echo "  ❌ $KEY: Failed (HTTP $HTTP_CODE) - $BODY"
            fi
          }

          # Parse each commit message
          COMMITS='${{ toJSON(github.event.commits.*.message) }}'
          echo "Commits: $COMMITS"

          echo "$COMMITS" | jq -r '.[]' | while IFS= read -r MSG; do
            echo ""
            echo "━━━ Commit: $MSG ━━━"

            KEY=$(echo "$MSG" | grep -oE '[A-Z]+-[0-9]+' | head -1)
            if [ -z "$KEY" ]; then
              echo "  No Jira key found, skipping"
              continue
            fi

            # "started" → In Progress (transition 21)
            if echo "$MSG" | grep -qi "started"; then
              move_issue "$KEY" "In Progress" "21"
            fi

            # "completed" → Code Review (transition 61)
            if echo "$MSG" | grep -qi "completed"; then
              move_issue "$KEY" "Code Review" "61"
            fi
          done

  # ─── On PR Merge: Move ALL subtasks to QA (Staging) ───
  on-pr-merge:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Move all subtasks to QA
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          # Extract parent key from branch name
          BRANCH="${{ github.event.pull_request.head.ref }}"
          PARENT_KEY=$(echo "$BRANCH" | grep -oE '[A-Z]+-[0-9]+' | head -1)

          if [ -z "$PARENT_KEY" ]; then
            echo "No Jira key found in branch: $BRANCH"
            exit 0
          fi

          echo "Parent: $PARENT_KEY"
          echo "Branch: $BRANCH"
          echo ""

          # Fetch all subtasks under parent using URL-encoded JQL
          JQL=$(python3 -c "import urllib.parse; print(urllib.parse.quote('parent=$PARENT_KEY'))")
          SUBTASKS=$(curl -s -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            "$JIRA_BASE_URL/rest/api/3/search/jql?jql=${JQL}&fields=status,summary")

          echo "DEBUG subtasks response: $(echo "$SUBTASKS" | head -c 500)"

          TOTAL=$(echo "$SUBTASKS" | jq -r '.total // 0')
          echo "Found $TOTAL subtasks under $PARENT_KEY"
          echo ""

          if [ "$TOTAL" = "0" ]; then
            echo "No subtasks found, trying alternate JQL..."
            JQL2=$(python3 -c "import urllib.parse; print(urllib.parse.quote('parent = $PARENT_KEY'))")
            SUBTASKS=$(curl -s -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              "$JIRA_BASE_URL/rest/api/3/search/jql?jql=${JQL2}&fields=status,summary")
            TOTAL=$(echo "$SUBTASKS" | jq -r '.total // 0')
            echo "Retry found $TOTAL subtasks"
          fi

          # Move each subtask to QA (transition 41)
          echo "$SUBTASKS" | jq -r '.issues[] | .key' | while read KEY; do
            echo "━━━ $KEY ━━━"

            RESULT=$(curl -s -w "\n%{http_code}" -X POST \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"transition":{"id":"41"}}' \
              "$JIRA_BASE_URL/rest/api/3/issue/$KEY/transitions")

            HTTP_CODE=$(echo "$RESULT" | tail -1)

            if [ "$HTTP_CODE" = "204" ]; then
              echo "  ✅ $KEY → QA"
            else
              echo "  ❌ Failed (HTTP $HTTP_CODE)"
            fi
          done

          # Move parent to QA too
          echo ""
          echo "━━━ Moving parent $PARENT_KEY → QA ━━━"
          RESULT=$(curl -s -w "\n%{http_code}" -X POST \
            -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"transition":{"id":"41"}}' \
            "$JIRA_BASE_URL/rest/api/3/issue/$PARENT_KEY/transitions")

          HTTP_CODE=$(echo "$RESULT" | tail -1)
          if [ "$HTTP_CODE" = "204" ]; then
            echo "  ✅ $PARENT_KEY → QA"
          else
            echo "  ❌ Failed (HTTP $HTTP_CODE)"
          fi

  # ─── On Production Deploy: Move specific subtasks to Prod → Done ───
  on-deploy-prod:
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy_env == 'production'
    runs-on: ubuntu-latest
    steps:
      - name: Move subtasks to Prod then Done
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          SUBTASK_KEYS: ${{ github.event.inputs.subtask_keys }}
        run: |
          if [ -z "$SUBTASK_KEYS" ]; then
            echo "No subtask keys provided. Nothing to do."
            exit 0
          fi

          echo "Releasing subtasks: $SUBTASK_KEYS"
          echo ""

          # Split comma-separated keys
          IFS=',' read -ra KEYS <<< "$SUBTASK_KEYS"

          for KEY in "${KEYS[@]}"; do
            # Trim whitespace
            KEY=$(echo "$KEY" | xargs)
            [ -z "$KEY" ] && continue

            echo "━━━ $KEY ━━━"

            # Move to Prod (transition 51)
            RESULT=$(curl -s -w "\n%{http_code}" -X POST \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"transition":{"id":"51"}}' \
              "$JIRA_BASE_URL/rest/api/3/issue/$KEY/transitions")
            HTTP_CODE=$(echo "$RESULT" | tail -1)
            if [ "$HTTP_CODE" = "204" ]; then
              echo "  ✅ $KEY → Prod"
            else
              echo "  ❌ $KEY → Prod failed (HTTP $HTTP_CODE)"
            fi

            # Move to Done (transition 31)
            RESULT=$(curl -s -w "\n%{http_code}" -X POST \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"transition":{"id":"31"}}' \
              "$JIRA_BASE_URL/rest/api/3/issue/$KEY/transitions")
            HTTP_CODE=$(echo "$RESULT" | tail -1)
            if [ "$HTTP_CODE" = "204" ]; then
              echo "  ✅ $KEY → Done"
            else
              echo "  ❌ $KEY → Done failed (HTTP $HTTP_CODE)"
            fi
            echo ""
          done
