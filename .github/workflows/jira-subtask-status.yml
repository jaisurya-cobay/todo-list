name: Jira - Subtask Status Automation

# Subtask status auto-move based on commit keywords and PR events
# Developer commit convention:
#   "PROJ-XX started ..." → To Do → In Progress
#   "PROJ-XX completed ..." → In Progress → Code Review
# PR merge to master → all subtasks → Staging
# Production deploy (manual) → subtasks → Production → Done

on:
  push:
    branches:
      - 'feature/**'
      - 'XPRMNTS-*'
  pull_request:
    types: [closed]
    branches:
      - master
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - production
      subtask_keys:
        description: 'Subtask keys (comma separated, e.g. PROJ-61,PROJ-62). Leave empty for ALL subtasks.'
        required: false
        type: string

jobs:

  # --- On Commit: Move individual subtasks based on keywords ---
  on-commit:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Process commits for subtask status
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          IN_PROGRESS_TRANSITION_ID: ${{ vars.JIRA_TRANSITION_IN_PROGRESS || '21' }}
          CODE_REVIEW_TRANSITION_ID: ${{ vars.JIRA_TRANSITION_CODE_REVIEW || '61' }}
        run: |
          move_issue() {
            local KEY=$1
            local TARGET_STATUS=$2
            local TRANSITION_ID=$3

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"transition\":{\"id\":\"$TRANSITION_ID\"}}" \
              "$JIRA_BASE_URL/rest/api/3/issue/$KEY/transitions")

            if [ "$HTTP_CODE" = "204" ]; then
              echo "  -> $KEY → $TARGET_STATUS"
            else
              echo "  -> $KEY failed (HTTP $HTTP_CODE)"
            fi
          }

          COMMITS='${{ toJSON(github.event.commits.*.message) }}'

          echo "$COMMITS" | jq -r '.[]' | while IFS= read -r MSG; do
            echo "--- Commit: $MSG ---"

            KEY=$(echo "$MSG" | grep -oE '[A-Z]+-[0-9]+' | head -1)
            if [ -z "$KEY" ]; then
              echo "  No Jira key found, skipping"
              continue
            fi

            if echo "$MSG" | grep -qi "started"; then
              move_issue "$KEY" "In Progress" "$IN_PROGRESS_TRANSITION_ID"
            fi

            if echo "$MSG" | grep -qi "completed"; then
              move_issue "$KEY" "Code Review" "$CODE_REVIEW_TRANSITION_ID"
            fi
          done

  # --- On PR Merge: Move ALL subtasks to Staging ---
  on-pr-merge:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Move all subtasks to Staging
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          STAGING_TRANSITION_ID: ${{ vars.JIRA_TRANSITION_STAGING || '41' }}
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          PARENT_KEY=$(echo "$BRANCH" | grep -oE '[A-Z]+-[0-9]+' | head -1)

          if [ -z "$PARENT_KEY" ]; then
            echo "No Jira key found in branch: $BRANCH"
            exit 0
          fi

          echo "Parent: $PARENT_KEY"
          echo "Branch: $BRANCH"

          # Fetch subtasks
          JQL=$(python3 -c "import urllib.parse; print(urllib.parse.quote('parent=$PARENT_KEY'))")
          SUBTASKS=$(curl -s -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            "$JIRA_BASE_URL/rest/api/3/search/jql?jql=${JQL}&fields=status,summary")

          TOTAL=$(echo "$SUBTASKS" | jq -r '.total // 0')
          echo "Found $TOTAL subtasks under $PARENT_KEY"

          if [ "$TOTAL" = "0" ]; then
            JQL2=$(python3 -c "import urllib.parse; print(urllib.parse.quote('parent = $PARENT_KEY'))")
            SUBTASKS=$(curl -s -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              "$JIRA_BASE_URL/rest/api/3/search/jql?jql=${JQL2}&fields=status,summary")
            TOTAL=$(echo "$SUBTASKS" | jq -r '.total // 0')
          fi

          # Move each subtask to Staging
          echo "$SUBTASKS" | jq -r '.issues[] | .key' | while read KEY; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"transition\":{\"id\":\"$STAGING_TRANSITION_ID\"}}" \
              "$JIRA_BASE_URL/rest/api/3/issue/$KEY/transitions")

            if [ "$HTTP_CODE" = "204" ]; then
              echo "  -> $KEY → Staging"
            else
              echo "  -> $KEY failed (HTTP $HTTP_CODE)"
            fi
          done

          # Move parent to Staging too
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"transition\":{\"id\":\"$STAGING_TRANSITION_ID\"}}" \
            "$JIRA_BASE_URL/rest/api/3/issue/$PARENT_KEY/transitions")

          if [ "$HTTP_CODE" = "204" ]; then
            echo "  -> $PARENT_KEY → Staging"
          else
            echo "  -> $PARENT_KEY failed (HTTP $HTTP_CODE)"
          fi

  # --- On Production Deploy: Move subtasks to Production → Done ---
  on-deploy-prod:
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy_env == 'production'
    runs-on: ubuntu-latest
    steps:
      - name: Move subtasks to Production then Done
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          PRODUCTION_TRANSITION_ID: ${{ vars.JIRA_TRANSITION_PRODUCTION || '51' }}
          DONE_TRANSITION_ID: ${{ vars.JIRA_TRANSITION_DONE || '31' }}
          SUBTASK_KEYS: ${{ github.event.inputs.subtask_keys }}
        run: |
          if [ -z "$SUBTASK_KEYS" ]; then
            echo "No subtask keys provided. Nothing to do."
            exit 0
          fi

          echo "Releasing subtasks: $SUBTASK_KEYS"

          IFS=',' read -ra KEYS <<< "$SUBTASK_KEYS"

          for KEY in "${KEYS[@]}"; do
            KEY=$(echo "$KEY" | xargs)
            [ -z "$KEY" ] && continue

            echo "--- $KEY ---"

            # Move to Production
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"transition\":{\"id\":\"$PRODUCTION_TRANSITION_ID\"}}" \
              "$JIRA_BASE_URL/rest/api/3/issue/$KEY/transitions")

            if [ "$HTTP_CODE" = "204" ]; then
              echo "  -> $KEY → Production"
            else
              echo "  -> $KEY → Production failed (HTTP $HTTP_CODE)"
            fi

            # Move to Done
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"transition\":{\"id\":\"$DONE_TRANSITION_ID\"}}" \
              "$JIRA_BASE_URL/rest/api/3/issue/$KEY/transitions")

            if [ "$HTTP_CODE" = "204" ]; then
              echo "  -> $KEY → Done"
            else
              echo "  -> $KEY → Done failed (HTTP $HTTP_CODE)"
            fi
          done
