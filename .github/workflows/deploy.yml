name: Deploy to Production

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        run: echo "Building..."

      - name: Deploy
        run: echo "Deploying to production..."

      - name: Extract Jira issue keys from commits
        id: issues
        run: |
          # Get all commits since last tag (or all commits if no tag)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:'%s %b')
          else
            COMMITS=$(git log -10 --pretty=format:'%s %b')
          fi

          KEYS=$(echo "$COMMITS" | grep -oE '[A-Z]+-[0-9]+' | sort -u | tr '\n' ' ')

          if [ -z "$KEYS" ]; then
            echo "No Jira issue keys found."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found issue keys: ${KEYS}"
            echo "keys=${KEYS}" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Transition issues to Prod
        if: steps.issues.outputs.found == 'true'
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"

          PROD_TRANSITION_ID="51"

          for KEY in ${{ steps.issues.outputs.keys }}; do
            echo "Processing ${KEY}..."

            # Transition to Prod
            curl -s -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -X POST \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}/transitions" \
              -d "{\"transition\":{\"id\":\"${PROD_TRANSITION_ID}\"}}"

            # Add deployment comment
            curl -s -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -X POST \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}/comment" \
              -d "{\"body\":{\"type\":\"doc\",\"version\":1,\"content\":[{\"type\":\"paragraph\",\"content\":[{\"type\":\"text\",\"text\":\"Deployed to production (${SHORT_SHA})\"},{\"type\":\"hardBreak\"},{\"type\":\"text\",\"text\":\"Repo: ${REPO}\"}]}]}}"

            echo "  -> ${KEY} transitioned to Prod"
          done

          echo "### Jira Issues in Production" >> "$GITHUB_STEP_SUMMARY"
          echo "Issues: ${{ steps.issues.outputs.keys }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Create Jira Release
        if: steps.issues.outputs.found == 'true'
        id: jira_release
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          VERSION_NAME="release-${DATE}-${{ github.run_number }}"
          PROJECT_ID="10208"

          # Create Jira version
          VERSION_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -X POST \
            "${JIRA_BASE_URL}/rest/api/3/version" \
            -d "{
              \"name\": \"${VERSION_NAME}\",
              \"projectId\": ${PROJECT_ID},
              \"released\": true,
              \"releaseDate\": \"${DATE}\",
              \"description\": \"Automated release from GitHub Actions run #${{ github.run_number }}\"
            }")

          HTTP_CODE=$(echo "$VERSION_RESPONSE" | tail -1)
          BODY=$(echo "$VERSION_RESPONSE" | sed '$d')
          VERSION_ID=$(echo "$BODY" | jq -r '.id // empty')

          if [ -n "$VERSION_ID" ]; then
            echo "Created Jira version: ${VERSION_NAME} (ID: ${VERSION_ID})"
            echo "version_id=${VERSION_ID}" >> "$GITHUB_OUTPUT"
            echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Failed to create Jira version (HTTP ${HTTP_CODE}): ${BODY}"
          fi

      - name: Link issues to Jira Release
        if: steps.jira_release.outputs.version_id != ''
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          VERSION_NAME="${{ steps.jira_release.outputs.version_name }}"

          for KEY in ${{ steps.issues.outputs.keys }}; do
            curl -s -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -X PUT \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}" \
              -d "{\"update\":{\"fixVersions\":[{\"add\":{\"name\":\"${VERSION_NAME}\"}}]}}"

            echo "  -> ${KEY} linked to ${VERSION_NAME}"
          done

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
        run: |
          DATE=$(date +%Y-%m-%d)
          TAG="release-${DATE}-${{ github.run_number }}"
          KEYS="${{ steps.issues.outputs.keys }}"

          NOTES="## What's Changed\n\n"

          # List commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            git log "${LAST_TAG}..HEAD" --pretty=format:'- %s' >> /tmp/commits.txt
          else
            git log -10 --pretty=format:'- %s' >> /tmp/commits.txt
          fi
          NOTES+="$(cat /tmp/commits.txt)\n\n"

          if [ -n "$KEYS" ]; then
            NOTES+="## Jira Issues\n\n"
            for KEY in $KEYS; do
              NOTES+="- [${KEY}](${JIRA_BASE_URL:-https://cobay.atlassian.net}/browse/${KEY})\n"
            done
          fi

          NOTES+="\n**Deployed:** ${DATE}"

          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            --title "Release ${DATE} (#${{ github.run_number }})" \
            --notes "$(echo -e "$NOTES")" \
            --latest

          echo "### Release Created" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** ${TAG}" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack releases-test channel
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.RELEASE_SLACK_WEBHOOK_URL }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
        run: |
          DATE=$(date +%Y-%m-%d)
          TAG="release-${DATE}-${{ github.run_number }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          IST_TIME=$(TZ='Asia/Kolkata' date "+%b %d, %Y %I:%M %p IST")
          UTC_TIME=$(date -u "+%b %d, %Y %I:%M %p UTC")
          KEYS="${{ steps.issues.outputs.keys }}"
          STATUS="${{ job.status }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$STATUS" = "success" ]; then
            HEADER="🚀  Release Deployed to Production"
            STATUS_TEXT="SUCCESS"
            URGENCY="✅  *Deployment completed successfully!*"
          else
            HEADER="⚠️  Release Deployment Failed"
            STATUS_TEXT="FAILED"
            URGENCY="🔴  *Deployment encountered errors. Check GitHub Actions.*"
          fi

          # Build Jira links
          JIRA_LINKS=""
          if [ -n "$KEYS" ]; then
            for KEY in $KEYS; do
              JIRA_LINKS+="<${JIRA_BASE_URL:-https://cobay.atlassian.net}/browse/${KEY}|${KEY}> "
            done
          else
            JIRA_LINKS="None"
          fi

          curl -s -X POST -H "Content-Type: application/json" \
            -d "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"${HEADER}\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"${URGENCY}\"
                  }
                },
                {\"type\": \"divider\"},
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {\"type\": \"mrkdwn\", \"text\": \"*📦 Repository:*\n<https://github.com/${{ github.repository }}|${{ github.repository }}>\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*🏷️ Tag:*\n\`${TAG}\`\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*🔀 Commit:*\n\`${SHORT_SHA}\`\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*👤 Triggered by:*\n${{ github.actor }}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*🔔 Status:*\n\`${STATUS_TEXT}\`\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*🎫 Jira Issues:*\n${JIRA_LINKS}\"}
                  ]
                },
                {\"type\": \"divider\"},
                {
                  \"type\": \"context\",
                  \"elements\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"⏰ *${IST_TIME}*  |  🌐 *${UTC_TIME}*  |  🔢 *Run #${{ github.run_number }}*\"
                    }
                  ]
                },
                {
                  \"type\": \"actions\",
                  \"elements\": [
                    {\"type\": \"button\", \"text\": {\"type\": \"plain_text\", \"text\": \"View Run\"}, \"url\": \"${RUN_URL}\"},
                    {\"type\": \"button\", \"text\": {\"type\": \"plain_text\", \"text\": \"GitHub Release\"}, \"url\": \"https://github.com/${{ github.repository }}/releases/tag/${TAG}\"}
                  ]
                }
              ]
            }" "$SLACK_WEBHOOK_URL"
