name: Deploy to Production

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY || 'XPRMNTS' }}
      PRODUCTION_TRANSITION_ID: ${{ vars.JIRA_TRANSITION_PRODUCTION || '51' }}
      DONE_TRANSITION_ID: ${{ vars.JIRA_TRANSITION_DONE || '31' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release variables
        run: |
          echo "RELEASE_DATE=$(date +%Y-%m-%d)" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=release-$(date +%Y-%m-%d)-${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"

      - name: Build
        run: echo "Building..."

      - name: Deploy
        run: echo "Deploying to production..."

      - name: Extract Jira issue keys from commits
        id: issues
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:'%s %b')
          else
            COMMITS=$(git log -10 --pretty=format:'%s %b')
          fi

          KEYS=$(echo "$COMMITS" | grep -oE '[A-Z]+-[0-9]+' | sort -u | tr '\n' ' ')

          if [ -z "$KEYS" ]; then
            echo "No Jira issue keys found."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found issue keys: ${KEYS}"
            echo "keys=${KEYS}" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Transition issues to Production (skip parents with subtasks)
        if: steps.issues.outputs.found == 'true'
        id: prod_transition
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          TRANSITIONED_KEYS=""
          SKIPPED_PARENTS=""

          for KEY in ${{ steps.issues.outputs.keys }}; do
            echo "Processing ${KEY}..."

            SUBTASK_COUNT=$(curl -s -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}?fields=subtasks" \
              | jq '.fields.subtasks | length // 0')

            if [ "$SUBTASK_COUNT" -gt 0 ] 2>/dev/null; then
              echo "  Skipping ${KEY} (parent with ${SUBTASK_COUNT} subtasks — use workflow_dispatch for subtask production deploys)"
              SKIPPED_PARENTS="${SKIPPED_PARENTS}${SKIPPED_PARENTS:+ }${KEY}"
              continue
            fi

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -X POST \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}/transitions" \
              -d "{\"transition\":{\"id\":\"${PRODUCTION_TRANSITION_ID}\"}}")

            if [ "$HTTP_CODE" = "204" ]; then
              echo "  -> ${KEY} transitioned to Production"
            else
              echo "  -> ${KEY} transition failed (HTTP ${HTTP_CODE})"
            fi

            curl -s -o /dev/null \
              -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -X POST \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}/comment" \
              -d "{\"body\":{\"type\":\"doc\",\"version\":1,\"content\":[{\"type\":\"paragraph\",\"content\":[{\"type\":\"text\",\"text\":\"Deployed to Production (${SHORT_SHA})\"},{\"type\":\"hardBreak\"},{\"type\":\"text\",\"text\":\"Repo: ${{ github.repository }}\"}]}]}}"

            TRANSITIONED_KEYS="${TRANSITIONED_KEYS}${TRANSITIONED_KEYS:+ }${KEY}"
          done

          echo "transitioned_keys=${TRANSITIONED_KEYS}" >> "$GITHUB_OUTPUT"
          echo "skipped_parents=${SKIPPED_PARENTS}" >> "$GITHUB_OUTPUT"

          echo "### Jira Issues → Production" >> "$GITHUB_STEP_SUMMARY"
          echo "Transitioned: ${TRANSITIONED_KEYS}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$SKIPPED_PARENTS" ]; then
            echo "Skipped parents (have subtasks): ${SKIPPED_PARENTS}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Collect fix versions from issues
        if: steps.issues.outputs.found == 'true'
        id: jira_release
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          VERSION_IDS=""
          VERSION_NAMES=""

          for KEY in ${{ steps.issues.outputs.keys }}; do
            echo "Fetching fix versions for ${KEY}..."

            RESPONSE=$(curl -s \
              -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}?fields=fixVersions")

            VERSIONS=$(echo "$RESPONSE" | jq -r '.fields.fixVersions // []')
            COUNT=$(echo "$VERSIONS" | jq 'length')

            if [ "$COUNT" = "0" ]; then
              echo "  ::warning::${KEY} has no fix version assigned"
              continue
            fi

            while IFS='|' read -r VID VNAME; do
              [ -z "$VID" ] && continue
              if ! echo "$VERSION_IDS" | grep -q "$VID"; then
                VERSION_IDS="${VERSION_IDS}${VERSION_IDS:+ }${VID}"
                VERSION_NAMES="${VERSION_NAMES}${VERSION_NAMES:+, }${VNAME}"
                echo "  -> Found version: ${VNAME} (ID: ${VID})"
              fi
            done < <(echo "$VERSIONS" | jq -r '.[] | "\(.id)|\(.name)"')
          done

          if [ -n "$VERSION_IDS" ]; then
            FIRST_VERSION=$(echo "$VERSION_NAMES" | cut -d',' -f1 | xargs)
            SANITIZED_TAG=$(echo "$FIRST_VERSION" | tr ' ' '-' | sed 's/[^a-zA-Z0-9._-]//g')
            echo "Collected fix versions: ${VERSION_NAMES}"
            echo "Using Jira version as release tag: ${SANITIZED_TAG} (from: ${FIRST_VERSION})"
            echo "RELEASE_TAG=${SANITIZED_TAG}" >> "$GITHUB_ENV"
            echo "version_ids=${VERSION_IDS}" >> "$GITHUB_OUTPUT"
            echo "version_names=${VERSION_NAMES}" >> "$GITHUB_OUTPUT"
            echo "found_versions=true" >> "$GITHUB_OUTPUT"
          else
            FALLBACK_TAG="release-${RELEASE_DATE}-${SHORT_SHA}"
            echo "::warning::No fix versions found on any issues, using fallback tag: ${FALLBACK_TAG}"
            echo "RELEASE_TAG=${FALLBACK_TAG}" >> "$GITHUB_ENV"
            echo "found_versions=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mark Jira releases as released
        if: steps.jira_release.outputs.found_versions == 'true'
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          for VID in ${{ steps.jira_release.outputs.version_ids }}; do
            echo "Marking version ID ${VID} as released..."

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -X PUT \
              "${JIRA_BASE_URL}/rest/api/3/version/${VID}" \
              -d "{
                \"released\": true,
                \"releaseDate\": \"${RELEASE_DATE}\"
              }")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "  -> Version ${VID} marked as released"
            else
              echo "  ::warning::Failed to mark version ${VID} as released (HTTP ${HTTP_CODE})"
            fi
          done

          echo "### Jira Releases Marked as Released" >> "$GITHUB_STEP_SUMMARY"
          echo "Versions: ${{ steps.jira_release.outputs.version_names }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Collect subtasks from Jira release
        if: steps.jira_release.outputs.found_versions == 'true'
        id: release_issues
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          VERSION_NAMES="${{ steps.jira_release.outputs.version_names }}"
          FIRST_VERSION=$(echo "$VERSION_NAMES" | cut -d',' -f1 | xargs)

          JQL=$(python3 -c "import urllib.parse; print(urllib.parse.quote('fixVersion = \"${FIRST_VERSION}\" ORDER BY issuetype ASC, key ASC'))")

          RESPONSE=$(curl -s \
            -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${JIRA_BASE_URL}/rest/api/3/search?jql=${JQL}&fields=summary,issuetype,status,assignee&maxResults=100")

          TOTAL=$(echo "$RESPONSE" | jq '.total // 0')
          echo "Found ${TOTAL} issues in release ${FIRST_VERSION}"

          ISSUE_LIST=""
          ISSUE_SUMMARY=""
          if [ "$TOTAL" -gt 0 ]; then
            while IFS='|' read -r KEY SUMMARY TYPE ASSIGNEE; do
              [ -z "$KEY" ] && continue
              ISSUE_LIST+="- [${KEY}](${JIRA_BASE_URL}/browse/${KEY}) ${SUMMARY} (${TYPE}, ${ASSIGNEE})\n"
              ISSUE_SUMMARY+="• <${JIRA_BASE_URL}/browse/${KEY}|${KEY}> ${SUMMARY} (${ASSIGNEE})\n"
            done < <(echo "$RESPONSE" | jq -r '.issues[] | "\(.key)|\(.fields.summary)|\(.fields.issuetype.name)|\(.fields.assignee.displayName // "unassigned")"')
          fi

          echo "release_issue_count=${TOTAL}" >> "$GITHUB_OUTPUT"

          echo "release_issues_md<<EOFISSUES" >> "$GITHUB_OUTPUT"
          echo -e "$ISSUE_LIST" >> "$GITHUB_OUTPUT"
          echo "EOFISSUES" >> "$GITHUB_OUTPUT"

          echo "release_issues_slack<<EOFSLACK" >> "$GITHUB_OUTPUT"
          echo -e "$ISSUE_SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOFSLACK" >> "$GITHUB_OUTPUT"

      - name: Transition standalone issues to Done (subtasks stay at Production)
        if: steps.issues.outputs.found == 'true'
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          TRANSITIONED="${{ steps.prod_transition.outputs.transitioned_keys }}"

          for KEY in $TRANSITIONED; do
            # Check if this issue has a parent (i.e. it's a subtask)
            PARENT_KEY=$(curl -s -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}?fields=parent" \
              | jq -r '.fields.parent.key // empty')

            if [ -n "$PARENT_KEY" ]; then
              echo "  -> ${KEY} is a subtask — staying at Production (manual Done required)"
              continue
            fi

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -X POST \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}/transitions" \
              -d "{\"transition\":{\"id\":\"${DONE_TRANSITION_ID}\"}}")

            if [ "$HTTP_CODE" = "204" ]; then
              echo "  -> ${KEY} transitioned to Done (standalone issue)"
            else
              echo "  -> ${KEY} Done transition failed (HTTP ${HTTP_CODE})"
            fi
          done

          echo "### Jira Issues → Done (standalone only, subtasks stay at Production)" >> "$GITHUB_STEP_SUMMARY"

      - name: Collect merged PRs since last release
        id: prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            TAG_EPOCH=$(git log -1 --format=%at "$LAST_TAG")
            SINCE_DATE=$(date -u -d "@${TAG_EPOCH}" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -r "${TAG_EPOCH}" +%Y-%m-%dT%H:%M:%SZ)
          else
            SINCE_DATE="2000-01-01T00:00:00Z"
          fi
          echo "Collecting PRs since: ${SINCE_DATE} (tag: ${LAST_TAG})"

          # Feature PRs merged to develop
          DEVELOP_PRS=$(gh pr list --base develop --state merged --limit 100 \
            --json number,title,author,mergedAt,headRefName \
            --jq "[.[] | select(.mergedAt > \"${SINCE_DATE}\")]")

          # Feature PRs merged directly to master (not from develop)
          MASTER_PRS=$(gh pr list --base master --state merged --limit 100 \
            --json number,title,author,mergedAt,headRefName \
            --jq "[.[] | select(.mergedAt > \"${SINCE_DATE}\" and .headRefName != \"develop\")]")

          # Combine and deduplicate
          PR_JSON=$(echo "${DEVELOP_PRS}${MASTER_PRS}" | jq -s 'add | unique_by(.number) | sort_by(.mergedAt)')

          PR_COUNT=$(echo "$PR_JSON" | jq 'length')
          echo "Found ${PR_COUNT} PRs"

          # Group by author
          AUTHORS=$(echo "$PR_JSON" | jq -r '.[].author.login' | sort -u)

          GROUPED_NOTES=""
          PR_SUMMARY=""
          for AUTHOR in $AUTHORS; do
            GROUPED_NOTES+="### @${AUTHOR}\n"
            while IFS='|' read -r NUM TITLE BRANCH; do
              GROUPED_NOTES+="- #${NUM} ${TITLE}"
              JIRA_KEY=$(echo "$BRANCH" | grep -oE '[A-Z]+-[0-9]+' | head -1)
              if [ -n "$JIRA_KEY" ]; then
                GROUPED_NOTES+=" (${JIRA_KEY})"
              fi
              GROUPED_NOTES+="\n"
              PR_SUMMARY+="• #${NUM} ${TITLE} (by ${AUTHOR})\n"
            done < <(echo "$PR_JSON" | jq -r ".[] | select(.author.login == \"${AUTHOR}\") | \"\(.number)|\(.title)|\(.headRefName)\"")
            GROUPED_NOTES+="\n"
          done

          echo "grouped_notes<<EOFNOTES" >> "$GITHUB_OUTPUT"
          echo -e "$GROUPED_NOTES" >> "$GITHUB_OUTPUT"
          echo "EOFNOTES" >> "$GITHUB_OUTPUT"

          echo "pr_summary<<EOFSUMMARY" >> "$GITHUB_OUTPUT"
          echo -e "$PR_SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOFSUMMARY" >> "$GITHUB_OUTPUT"

          AUTHOR_COUNT=$(echo "$AUTHORS" | wc -w | tr -d ' ')
          echo "pr_count=${PR_COUNT}" >> "$GITHUB_OUTPUT"
          echo "author_count=${AUTHOR_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
        run: |
          KEYS="${{ steps.issues.outputs.keys }}"

          JIRA_VERSIONS="${{ steps.jira_release.outputs.version_names }}"
          RELEASE_ISSUE_COUNT="${{ steps.release_issues.outputs.release_issue_count }}"

          NOTES="## Release Summary\n\n"
          NOTES+="**PRs:** ${{ steps.prs.outputs.pr_count }} | **Contributors:** ${{ steps.prs.outputs.author_count }}"
          if [ -n "$JIRA_VERSIONS" ]; then
            NOTES+=" | **Jira Release:** ${JIRA_VERSIONS}"
          fi
          if [ -n "$RELEASE_ISSUE_COUNT" ] && [ "$RELEASE_ISSUE_COUNT" -gt 0 ] 2>/dev/null; then
            NOTES+=" | **Issues:** ${RELEASE_ISSUE_COUNT}"
          fi
          NOTES+="\n\n"
          NOTES+="## Changes by Developer\n\n"
          NOTES+="${{ steps.prs.outputs.grouped_notes }}\n"

          RELEASE_ISSUES_MD="${{ steps.release_issues.outputs.release_issues_md }}"
          if [ -n "$RELEASE_ISSUES_MD" ]; then
            NOTES+="## Release Contents (${JIRA_VERSIONS})\n\n"
            NOTES+="${RELEASE_ISSUES_MD}\n"
          elif [ -n "$KEYS" ]; then
            NOTES+="## Jira Issues\n\n"
            for KEY in $KEYS; do
              NOTES+="- [${KEY}](${JIRA_BASE_URL}/browse/${KEY})\n"
            done
          fi

          NOTES+="\n**Deployed:** ${RELEASE_DATE}"

          if git rev-parse "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists locally, updating..."
            git tag -d "${RELEASE_TAG}"
          fi
          git tag "${RELEASE_TAG}"

          if git ls-remote --tags origin "refs/tags/${RELEASE_TAG}" | grep -q "${RELEASE_TAG}"; then
            echo "Tag ${RELEASE_TAG} already exists on remote, force-pushing..."
            git push origin "${RELEASE_TAG}" --force
          else
            git push origin "${RELEASE_TAG}"
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists, updating..."
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TAG} (${RELEASE_DATE})" \
              --notes "$(echo -e "$NOTES")" \
              --latest
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TAG} (${RELEASE_DATE})" \
              --notes "$(echo -e "$NOTES")" \
              --latest
          fi

          echo "### GitHub Release Created" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** ${RELEASE_TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **PRs:** ${{ steps.prs.outputs.pr_count }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack - Production release
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.RELEASE_SLACK_WEBHOOK_URL }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
        run: |
          IST_TIME=$(TZ='Asia/Kolkata' date "+%b %d, %Y %I:%M %p IST")
          UTC_TIME=$(date -u "+%b %d, %Y %I:%M %p UTC")
          KEYS="${{ steps.issues.outputs.keys }}"
          STATUS="${{ job.status }}"

          if [ "$STATUS" = "success" ]; then
            HEADER="Release Deployed to Production"
            STATUS_TEXT="SUCCESS"
            URGENCY="Deployment completed successfully!"
          else
            HEADER="Release Deployment Failed"
            STATUS_TEXT="FAILED"
            URGENCY="Deployment encountered errors. Check GitHub Actions."
          fi

          # Build Jira links
          JIRA_LINKS=""
          if [ -n "$KEYS" ]; then
            for KEY in $KEYS; do
              JIRA_LINKS+="<${JIRA_BASE_URL}/browse/${KEY}|${KEY}> "
            done
          else
            JIRA_LINKS="None"
          fi

          PR_COUNT="${{ steps.prs.outputs.pr_count }}"
          AUTHOR_COUNT="${{ steps.prs.outputs.author_count }}"
          PR_SUMMARY="${{ steps.prs.outputs.pr_summary }}"
          RELEASE_ISSUES_SLACK="${{ steps.release_issues.outputs.release_issues_slack }}"
          if [ -z "$PR_SUMMARY" ]; then
            PR_SUMMARY="No PRs found"
          fi
          if [ -z "$RELEASE_ISSUES_SLACK" ]; then
            RELEASE_ISSUES_SLACK="No issues found"
          fi

          curl -s -X POST -H "Content-Type: application/json" \
            -d "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"${HEADER}\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*${URGENCY}*\"
                  }
                },
                {\"type\": \"divider\"},
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {\"type\": \"mrkdwn\", \"text\": \"*Repository:*\n<https://github.com/${{ github.repository }}|${{ github.repository }}>\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Release Version:*\n\`${RELEASE_TAG}\`\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Commit:*\n\`${SHORT_SHA}\`\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Triggered by:*\n${{ github.actor }}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Status:*\n\`${STATUS_TEXT}\`\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Jira Issues:*\n${JIRA_LINKS}\"}
                  ]
                },
                {\"type\": \"divider\"},
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Release Summary: ${PR_COUNT} PRs from ${AUTHOR_COUNT} contributors*\n\n${PR_SUMMARY}\"
                  }
                },
                {\"type\": \"divider\"},
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*Release Contents (${RELEASE_TAG}):*\n\n${RELEASE_ISSUES_SLACK}\"
                  }
                },
                {\"type\": \"divider\"},
                {
                  \"type\": \"context\",
                  \"elements\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"${IST_TIME}  |  ${UTC_TIME}  |  Run #${{ github.run_number }}\"
                    }
                  ]
                },
                {
                  \"type\": \"actions\",
                  \"elements\": [
                    {\"type\": \"button\", \"text\": {\"type\": \"plain_text\", \"text\": \"GitHub Release\"}, \"url\": \"https://github.com/${{ github.repository }}/releases/tag/${RELEASE_TAG}\"}
                  ]
                }
              ]
            }" "$SLACK_WEBHOOK_URL"
