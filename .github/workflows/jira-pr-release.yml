name: PR Merged to Develop - Jira Staging

on:
  pull_request:
    types: [closed]
    branches: [develop]

jobs:
  transition-to-staging:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Extract Jira issue keys from PR
        id: issues
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          ALL_TEXT="${PR_TITLE} ${PR_BODY} ${BRANCH}"
          KEYS=$(echo "$ALL_TEXT" | grep -oE '[A-Z]+-[0-9]+' | sort -u | tr '\n' ' ')

          if [ -z "$KEYS" ]; then
            echo "No Jira issue keys found. Skipping."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found issue keys: ${KEYS}"
            echo "keys=${KEYS}" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Transition issues to Staging
        if: steps.issues.outputs.found == 'true'
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPO: ${{ github.repository }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
        run: |
          STAGING_TRANSITION_ID="41"

          for KEY in ${{ steps.issues.outputs.keys }}; do
            echo "Processing ${KEY}..."

            # Transition to Staging
            curl -s -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -X POST \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}/transitions" \
              -d "{\"transition\":{\"id\":\"${STAGING_TRANSITION_ID}\"}}"

            # Add merge comment
            curl -s -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -X POST \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}/comment" \
              -d "{\"body\":{\"type\":\"doc\",\"version\":1,\"content\":[{\"type\":\"paragraph\",\"content\":[{\"type\":\"text\",\"text\":\"PR #${PR_NUM} merged to develop by ${MERGED_BY}\"},{\"type\":\"hardBreak\"},{\"type\":\"text\",\"text\":\"Title: ${PR_TITLE}\"},{\"type\":\"hardBreak\"},{\"type\":\"text\",\"text\":\"Deployed to Staging environment\"}]}]}}"

            echo "  -> ${KEY} transitioned to Staging"
          done

          echo "### Jira Issues Moved to Staging" >> "$GITHUB_STEP_SUMMARY"
          echo "Issues: ${{ steps.issues.outputs.keys }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack - Staging deployment
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.STAGING_SLACK_WEBHOOK_URL }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          IST_TIME=$(TZ='Asia/Kolkata' date "+%b %d, %Y %I:%M %p IST")
          UTC_TIME=$(date -u "+%b %d, %Y %I:%M %p UTC")
          KEYS="${{ steps.issues.outputs.keys }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Build Jira links
          JIRA_LINKS=""
          if [ -n "$KEYS" ]; then
            for KEY in $KEYS; do
              JIRA_LINKS+="<${JIRA_BASE_URL:-https://cobay.atlassian.net}/browse/${KEY}|${KEY}> "
            done
          else
            JIRA_LINKS="None"
          fi

          curl -s -X POST -H "Content-Type: application/json" \
            -d "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"Deployed to Staging\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*PR merged to develop — moved to Staging*\"
                  }
                },
                {\"type\": \"divider\"},
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {\"type\": \"mrkdwn\", \"text\": \"*Repository:*\n<https://github.com/${{ github.repository }}|${{ github.repository }}>\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*PR:*\n<${PR_URL}|#${PR_NUM} ${PR_TITLE}>\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Branch:*\n\`${BRANCH}\`\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Merged by:*\n${MERGED_BY}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Jira Issues:*\n${JIRA_LINKS}\"},
                    {\"type\": \"mrkdwn\", \"text\": \"*Status:*\n\`STAGING\`\"}
                  ]
                },
                {\"type\": \"divider\"},
                {
                  \"type\": \"context\",
                  \"elements\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"${IST_TIME}  |  ${UTC_TIME}\"
                    }
                  ]
                },
                {
                  \"type\": \"actions\",
                  \"elements\": [
                    {\"type\": \"button\", \"text\": {\"type\": \"plain_text\", \"text\": \"View PR\"}, \"url\": \"${PR_URL}\"}
                  ]
                }
              ]
            }" "$SLACK_WEBHOOK_URL"
