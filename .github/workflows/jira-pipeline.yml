name: Jira Pipeline Automation

# Combined workflow: subtask status + deploy + PR code review
#
# Lifecycle:
#   Push to feature branch     -> Parent issue -> In Progress
#   PR opened to develop       -> Referenced issues -> Review
#   PR merged to develop       -> Referenced subtasks -> Staging + Slack
#   Push to master             -> Deploy to Production + GitHub Release + Slack
#   workflow_dispatch           -> Specified subtasks -> Production

on:
  push:
    branches:
      - master
      - 'feature/**'
      - '[A-Z][A-Z]*-[0-9]*'
  pull_request:
    types: [opened, reopened, closed]
    branches:
      - develop
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - production
      subtask_keys:
        description: 'Subtask keys (comma separated, e.g. PROJ-61,PROJ-62).'
        required: true
        type: string

permissions:
  contents: write

jobs:

  # ============================================================
  # ON COMMIT: Move parent to In Progress (feature branch push)
  # ============================================================
  on-commit:
    if: github.event_name == 'push' && github.ref_name != 'master'
    runs-on: ubuntu-latest
    steps:
      - name: Move parent to In Progress on first push
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          IN_PROGRESS_TRANSITION_ID: ${{ vars.JIRA_TRANSITION_IN_PROGRESS }}
          BRANCH: ${{ github.ref_name }}
        run: |
          PARENT_KEY=$(echo "$BRANCH" | grep -oE '[A-Z]+-[0-9]+' | head -1)

          if [ -z "$PARENT_KEY" ]; then
            echo "No Jira key found in branch: $BRANCH"
            exit 0
          fi

          SUBTASK_COUNT=$(curl -s -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            "$JIRA_BASE_URL/rest/api/3/issue/$PARENT_KEY?fields=subtasks" \
            | jq '.fields.subtasks | length // 0')

          echo "Branch: $BRANCH | Issue: $PARENT_KEY | Subtasks: $SUBTASK_COUNT"

          echo "Moving $PARENT_KEY to In Progress (idempotent)"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"transition\":{\"id\":\"$IN_PROGRESS_TRANSITION_ID\"}}" \
            "$JIRA_BASE_URL/rest/api/3/issue/$PARENT_KEY/transitions")

          if [ "$HTTP_CODE" = "204" ]; then
            echo "  -> $PARENT_KEY -> In Progress"
          else
            echo "  -> $PARENT_KEY -> In Progress skipped/failed (HTTP $HTTP_CODE)"
          fi

  # ============================================================
  # ON PR OPENED: Move referenced issues to Review
  # ============================================================
  on-pr-review:
    if: >
      github.event_name == 'pull_request' &&
      github.event.action != 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: jira-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout repo for commit history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Jira subtask keys from PR and commits
        id: issues
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          PARENT_KEY=$(echo "$BRANCH" | grep -oE '[A-Z]+-[0-9]+' | head -1)

          COMMIT_MSGS=$(git log origin/develop..HEAD --format=%s 2>/dev/null || echo "")
          ALL_TEXT="${PR_TITLE} ${PR_BODY} ${COMMIT_MSGS}"
          KEYS=$(echo "$ALL_TEXT" | grep -oE '[A-Z]+-[0-9]+' | sort -u | tr '\n' ' ')

          if [ -z "$KEYS" ]; then
            echo "No Jira issue keys found. Skipping."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found issue keys: ${KEYS}"
            echo "keys=${KEYS}" >> "$GITHUB_OUTPUT"
            echo "parent_key=${PARENT_KEY}" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Transition referenced issues to Review
        if: steps.issues.outputs.found == 'true'
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          REVIEW_TRANSITION_ID: ${{ vars.JIRA_TRANSITION_REVIEW }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          ISSUE_KEYS: ${{ steps.issues.outputs.keys }}
        run: |
          for KEY in $ISSUE_KEYS; do
            echo "Processing ${KEY}..."

            SUBTASK_COUNT=$(curl -s -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}?fields=subtasks" \
              | jq '.fields.subtasks | length // 0')

            if [ "$SUBTASK_COUNT" -gt 0 ] 2>/dev/null; then
              echo "  Skipping ${KEY} (parent with subtasks)"
              continue
            fi

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -X POST \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}/transitions" \
              -d "{\"transition\":{\"id\":\"${REVIEW_TRANSITION_ID}\"}}")

            if [ "$HTTP_CODE" = "204" ]; then
              echo "  -> ${KEY} -> Review"
            else
              echo "  -> ${KEY} failed (HTTP ${HTTP_CODE})"
            fi

            COMMENT_BODY=$(jq -n \
              --arg pr "PR #${PR_NUM} opened by ${AUTHOR}" \
              --arg title "Title: ${PR_TITLE}" \
              --arg url "URL: ${PR_URL}" \
              --arg status "Status: Review" \
              '{body:{type:"doc",version:1,content:[{type:"paragraph",content:[{type:"text",text:$pr},{type:"hardBreak"},{type:"text",text:$title},{type:"hardBreak"},{type:"text",text:$url},{type:"hardBreak"},{type:"text",text:$status}]}]}}')

            curl -s -o /dev/null \
              -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -X POST \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}/comment" \
              -d "$COMMENT_BODY"
          done

          echo "### Jira Issues -> Review" >> "$GITHUB_STEP_SUMMARY"
          echo "Issues: ${ISSUE_KEYS}" >> "$GITHUB_STEP_SUMMARY"

  # ============================================================
  # ON PR MERGE: Move referenced subtasks to Staging + Slack
  # ============================================================
  on-pr-merge:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo for commit history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move only referenced subtasks to Staging
        id: staging
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          STAGING_TRANSITION_ID: ${{ vars.JIRA_TRANSITION_STAGING }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_NUM: ${{ github.event.pull_request.number }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
        run: |
          PARENT_KEY=$(echo "$BRANCH" | grep -oE '[A-Z]+-[0-9]+' | head -1)

          if [ -z "$PARENT_KEY" ]; then
            echo "No Jira key found in branch: $BRANCH"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Parent: $PARENT_KEY"
          echo "Branch: $BRANCH"

          COMMIT_MSGS=$(git log --format=%s "$MERGE_SHA"^1.."$MERGE_SHA"^2 2>/dev/null || echo "")
          ALL_TEXT="${PR_TITLE} ${PR_BODY} ${COMMIT_MSGS}"
          MENTIONED_KEYS=$(echo "$ALL_TEXT" | grep -oE '[A-Z]+-[0-9]+' | sort -u | tr '\n' ' ')
          echo "Keys mentioned in PR: $MENTIONED_KEYS"

          TRANSITIONED_KEYS=""

          SUBTASK_COUNT=$(curl -s -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            "$JIRA_BASE_URL/rest/api/3/issue/$PARENT_KEY?fields=subtasks" \
            | jq '.fields.subtasks | length // 0')

          build_comment() {
            jq -n \
              --arg pr "PR #${PR_NUM} merged to develop by ${MERGED_BY}" \
              --arg title "Title: ${PR_TITLE}" \
              --arg status "Status: Deployed to Staging" \
              '{body:{type:"doc",version:1,content:[{type:"paragraph",content:[{type:"text",text:$pr},{type:"hardBreak"},{type:"text",text:$title},{type:"hardBreak"},{type:"text",text:$status}]}]}}'
          }

          if [ "$SUBTASK_COUNT" -gt 0 ] 2>/dev/null; then
            JQL=$(python3 -c "import urllib.parse; print(urllib.parse.quote('parent=$PARENT_KEY'))")
            SUBTASKS=$(curl -s -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              "$JIRA_BASE_URL/rest/api/3/search/jql?jql=${JQL}&fields=status,summary")

            echo "$SUBTASKS" | jq -r '.issues[] | .key' | while read KEY; do
              if echo "$MENTIONED_KEYS" | grep -qw "$KEY"; then
                HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                  -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "{\"transition\":{\"id\":\"$STAGING_TRANSITION_ID\"}}" \
                  "$JIRA_BASE_URL/rest/api/3/issue/$KEY/transitions")

                if [ "$HTTP_CODE" = "204" ]; then
                  echo "  -> $KEY -> Staging"
                fi
              fi
            done

            COMMENT_BODY=$(build_comment)

            for KEY in $MENTIONED_KEYS; do
              if [ "$KEY" = "$PARENT_KEY" ]; then
                continue
              fi
              curl -s -o /dev/null \
                -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
                -H "Content-Type: application/json" \
                -X POST \
                "$JIRA_BASE_URL/rest/api/3/issue/$KEY/comment" \
                -d "$COMMENT_BODY"
            done

            TRANSITIONED_KEYS="$MENTIONED_KEYS"
            echo "Skipping parent $PARENT_KEY (has subtasks — only uses To Do / In Progress)"
          else
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"transition\":{\"id\":\"$STAGING_TRANSITION_ID\"}}" \
              "$JIRA_BASE_URL/rest/api/3/issue/$PARENT_KEY/transitions")

            if [ "$HTTP_CODE" = "204" ]; then
              echo "  -> $PARENT_KEY -> Staging (standalone issue, no subtasks)"
            else
              echo "  -> $PARENT_KEY failed (HTTP $HTTP_CODE)"
            fi

            COMMENT_BODY=$(build_comment)

            curl -s -o /dev/null \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Content-Type: application/json" \
              -X POST \
              "$JIRA_BASE_URL/rest/api/3/issue/$PARENT_KEY/comment" \
              -d "$COMMENT_BODY"

            TRANSITIONED_KEYS="$PARENT_KEY"
          fi

          echo "keys=${TRANSITIONED_KEYS}" >> "$GITHUB_OUTPUT"
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Notify Slack - Staging deployment
        if: steps.staging.outputs.found == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.STAGING_SLACK_WEBHOOK_URL }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          ISSUE_KEYS: ${{ steps.staging.outputs.keys }}
          REPO_NAME: ${{ github.repository }}
        run: |
          IST_TIME=$(TZ='Asia/Kolkata' date "+%b %d, %Y %I:%M %p IST")
          UTC_TIME=$(date -u "+%b %d, %Y %I:%M %p UTC")

          JIRA_LINKS=""
          for KEY in $ISSUE_KEYS; do
            JIRA_LINKS+="<${JIRA_BASE_URL}/browse/${KEY}|${KEY}> "
          done

          REPO_URL="https://github.com/${REPO_NAME}"

          REPO_FIELD=$(printf '*Repository:*\n<%s|%s>' "$REPO_URL" "$REPO_NAME")
          PR_FIELD=$(printf '*PR:*\n<%s|#%s %s>' "$PR_URL" "$PR_NUM" "$PR_TITLE")
          BRANCH_FIELD=$(printf '*Branch:*\n`%s`' "$BRANCH")
          MERGED_FIELD=$(printf '*Merged by:*\n%s' "$MERGED_BY")
          JIRA_FIELD=$(printf '*Jira Issues:*\n%s' "$JIRA_LINKS")
          STATUS_FIELD=$(printf '*Status:*\n`STAGING`')

          PAYLOAD=$(jq -n \
            --arg repo_field "$REPO_FIELD" \
            --arg pr_field "$PR_FIELD" \
            --arg branch_field "$BRANCH_FIELD" \
            --arg merged_field "$MERGED_FIELD" \
            --arg jira_field "$JIRA_FIELD" \
            --arg status_field "$STATUS_FIELD" \
            --arg context "${IST_TIME}  |  ${UTC_TIME}" \
            --arg pr_url "$PR_URL" \
            '{blocks:[
              {type:"header",text:{type:"plain_text",text:"Deployed to Staging"}},
              {type:"section",text:{type:"mrkdwn",text:"*PR merged to develop - moved to Staging*"}},
              {type:"divider"},
              {type:"section",fields:[
                {type:"mrkdwn",text:$repo_field},
                {type:"mrkdwn",text:$pr_field},
                {type:"mrkdwn",text:$branch_field},
                {type:"mrkdwn",text:$merged_field},
                {type:"mrkdwn",text:$jira_field},
                {type:"mrkdwn",text:$status_field}
              ]},
              {type:"divider"},
              {type:"context",elements:[{type:"mrkdwn",text:$context}]},
              {type:"actions",elements:[{type:"button",text:{type:"plain_text",text:"View PR"},url:$pr_url}]}
            ]}')

          curl -s -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$SLACK_WEBHOOK_URL"

  # ============================================================
  # ON DEPLOY: Production deploy (push to master)
  # ============================================================
  deploy:
    if: github.event_name == 'push' && github.ref_name == 'master'
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    env:
      JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY }}
      PRODUCTION_TRANSITION_ID: ${{ vars.JIRA_TRANSITION_PRODUCTION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release variables
        run: |
          echo "RELEASE_DATE=$(date +%Y-%m-%d)" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=release-$(date +%Y-%m-%d)-${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"

      - name: Build
        run: echo "Building..."

      - name: Deploy
        run: echo "Deploying to production..."

      - name: Extract Jira issue keys from commits
        id: issues
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:'%s %b')
          else
            COMMITS=$(git log -10 --pretty=format:'%s %b')
          fi

          KEYS=$(echo "$COMMITS" | grep -oE '[A-Z]+-[0-9]+' | sort -u | tr '\n' ' ')

          if [ -z "$KEYS" ]; then
            echo "No Jira issue keys found."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found issue keys: ${KEYS}"
            echo "keys=${KEYS}" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Transition issues to Production (skip parents with subtasks)
        if: steps.issues.outputs.found == 'true'
        id: prod_transition
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ISSUE_KEYS: ${{ steps.issues.outputs.keys }}
        run: |
          TRANSITIONED_KEYS=""
          SKIPPED_PARENTS=""

          for KEY in $ISSUE_KEYS; do
            echo "Processing ${KEY}..."

            SUBTASK_COUNT=$(curl -s -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}?fields=subtasks" \
              | jq '.fields.subtasks | length // 0')

            if [ "$SUBTASK_COUNT" -gt 0 ] 2>/dev/null; then
              echo "  Skipping ${KEY} (parent with ${SUBTASK_COUNT} subtasks — use workflow_dispatch for subtask production deploys)"
              SKIPPED_PARENTS="${SKIPPED_PARENTS}${SKIPPED_PARENTS:+ }${KEY}"
              continue
            fi

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -X POST \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}/transitions" \
              -d "{\"transition\":{\"id\":\"${PRODUCTION_TRANSITION_ID}\"}}")

            if [ "$HTTP_CODE" = "204" ]; then
              echo "  -> ${KEY} transitioned to Production"
            else
              echo "  -> ${KEY} transition failed (HTTP ${HTTP_CODE})"
            fi

            COMMENT_BODY=$(jq -n \
              --arg deploy "Deployed to Production (${SHORT_SHA})" \
              --arg repo "Repo: ${GITHUB_REPOSITORY}" \
              '{body:{type:"doc",version:1,content:[{type:"paragraph",content:[{type:"text",text:$deploy},{type:"hardBreak"},{type:"text",text:$repo}]}]}}')

            curl -s -o /dev/null \
              -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -X POST \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}/comment" \
              -d "$COMMENT_BODY"

            TRANSITIONED_KEYS="${TRANSITIONED_KEYS}${TRANSITIONED_KEYS:+ }${KEY}"
          done

          echo "transitioned_keys=${TRANSITIONED_KEYS}" >> "$GITHUB_OUTPUT"
          echo "skipped_parents=${SKIPPED_PARENTS}" >> "$GITHUB_OUTPUT"

          echo "### Jira Issues -> Production" >> "$GITHUB_STEP_SUMMARY"
          echo "Transitioned: ${TRANSITIONED_KEYS}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$SKIPPED_PARENTS" ]; then
            echo "Skipped parents (have subtasks): ${SKIPPED_PARENTS}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Collect fix versions from issues
        if: steps.issues.outputs.found == 'true'
        id: jira_release
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ISSUE_KEYS: ${{ steps.issues.outputs.keys }}
        run: |
          VERSION_IDS=""
          VERSION_NAMES=""

          for KEY in $ISSUE_KEYS; do
            echo "Fetching fix versions for ${KEY}..."

            RESPONSE=$(curl -s \
              -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}?fields=fixVersions")

            VERSIONS=$(echo "$RESPONSE" | jq -r '.fields.fixVersions // []')
            COUNT=$(echo "$VERSIONS" | jq 'length')

            if [ "$COUNT" = "0" ]; then
              echo "  ::warning::${KEY} has no fix version assigned"
              continue
            fi

            while IFS='|' read -r VID VNAME; do
              [ -z "$VID" ] && continue
              if ! echo "$VERSION_IDS" | grep -q "$VID"; then
                VERSION_IDS="${VERSION_IDS}${VERSION_IDS:+ }${VID}"
                VERSION_NAMES="${VERSION_NAMES}${VERSION_NAMES:+, }${VNAME}"
                echo "  -> Found version: ${VNAME} (ID: ${VID})"
              fi
            done < <(echo "$VERSIONS" | jq -r '.[] | "\(.id)|\(.name)"')
          done

          if [ -n "$VERSION_IDS" ]; then
            FIRST_VERSION=$(echo "$VERSION_NAMES" | cut -d',' -f1 | xargs)
            SANITIZED_TAG=$(echo "$FIRST_VERSION" | tr ' ' '-' | sed 's/[^a-zA-Z0-9._-]//g')
            echo "Collected fix versions: ${VERSION_NAMES}"
            echo "Using Jira version as release tag: ${SANITIZED_TAG} (from: ${FIRST_VERSION})"
            echo "RELEASE_TAG=${SANITIZED_TAG}" >> "$GITHUB_ENV"
            echo "version_ids=${VERSION_IDS}" >> "$GITHUB_OUTPUT"
            echo "version_names=${VERSION_NAMES}" >> "$GITHUB_OUTPUT"
            echo "found_versions=true" >> "$GITHUB_OUTPUT"
          else
            FALLBACK_TAG="release-${RELEASE_DATE}-${SHORT_SHA}"
            echo "::warning::No fix versions found on any issues, using fallback tag: ${FALLBACK_TAG}"
            echo "RELEASE_TAG=${FALLBACK_TAG}" >> "$GITHUB_ENV"
            echo "found_versions=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mark Jira releases as released
        if: steps.jira_release.outputs.found_versions == 'true'
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          VERSION_IDS: ${{ steps.jira_release.outputs.version_ids }}
          VERSION_NAMES: ${{ steps.jira_release.outputs.version_names }}
        run: |
          for VID in $VERSION_IDS; do
            echo "Marking version ID ${VID} as released..."

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -X PUT \
              "${JIRA_BASE_URL}/rest/api/3/version/${VID}" \
              -d "{
                \"released\": true,
                \"releaseDate\": \"${RELEASE_DATE}\"
              }")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "  -> Version ${VID} marked as released"
            else
              echo "  ::warning::Failed to mark version ${VID} as released (HTTP ${HTTP_CODE})"
            fi
          done

          echo "### Jira Releases Marked as Released" >> "$GITHUB_STEP_SUMMARY"
          echo "Versions: ${VERSION_NAMES}" >> "$GITHUB_STEP_SUMMARY"

      - name: Collect subtasks from Jira release
        if: steps.jira_release.outputs.found_versions == 'true'
        id: release_issues
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          VERSION_NAMES: ${{ steps.jira_release.outputs.version_names }}
        run: |
          FIRST_VERSION=$(echo "$VERSION_NAMES" | cut -d',' -f1 | xargs)

          JQL=$(python3 -c "import urllib.parse; print(urllib.parse.quote('fixVersion = \"${FIRST_VERSION}\" ORDER BY issuetype ASC, key ASC'))")

          RESPONSE=$(curl -s \
            -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${JIRA_BASE_URL}/rest/api/3/search?jql=${JQL}&fields=summary,issuetype,status,assignee&maxResults=100")

          TOTAL=$(echo "$RESPONSE" | jq '.total // 0')
          echo "Found ${TOTAL} issues in release ${FIRST_VERSION}"

          ISSUE_LIST=""
          ISSUE_SUMMARY=""
          if [ "$TOTAL" -gt 0 ]; then
            while IFS='|' read -r KEY SUMMARY TYPE ASSIGNEE; do
              [ -z "$KEY" ] && continue
              ISSUE_LIST+="- [${KEY}](${JIRA_BASE_URL}/browse/${KEY}) ${SUMMARY} (${TYPE}, ${ASSIGNEE})\n"
              ISSUE_SUMMARY+="• <${JIRA_BASE_URL}/browse/${KEY}|${KEY}> ${SUMMARY} (${ASSIGNEE})\n"
            done < <(echo "$RESPONSE" | jq -r '.issues[] | "\(.key)|\(.fields.summary)|\(.fields.issuetype.name)|\(.fields.assignee.displayName // "unassigned")"')
          fi

          echo "release_issue_count=${TOTAL}" >> "$GITHUB_OUTPUT"

          echo "release_issues_md<<EOFISSUES" >> "$GITHUB_OUTPUT"
          echo -e "$ISSUE_LIST" >> "$GITHUB_OUTPUT"
          echo "EOFISSUES" >> "$GITHUB_OUTPUT"

          echo "release_issues_slack<<EOFSLACK" >> "$GITHUB_OUTPUT"
          echo -e "$ISSUE_SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOFSLACK" >> "$GITHUB_OUTPUT"

      - name: Log Production status (Done is manual for all issues)
        if: steps.issues.outputs.found == 'true'
        env:
          TRANSITIONED_KEYS: ${{ steps.prod_transition.outputs.transitioned_keys }}
        run: |
          echo "All transitioned issues stay at Production — Done transition is manual."
          echo "### Jira Issues at Production (Done is manual)" >> "$GITHUB_STEP_SUMMARY"
          echo "Transitioned: ${TRANSITIONED_KEYS}" >> "$GITHUB_STEP_SUMMARY"

      - name: Collect merged PRs since last release
        id: prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            TAG_EPOCH=$(git log -1 --format=%at "$LAST_TAG")
            SINCE_DATE=$(date -u -d "@${TAG_EPOCH}" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -r "${TAG_EPOCH}" +%Y-%m-%dT%H:%M:%SZ)
          else
            # No previous tag — only include PRs from last 30 days instead of all time
            SINCE_DATE=$(date -u -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-30d +%Y-%m-%dT%H:%M:%SZ)
          fi
          echo "Collecting PRs since: ${SINCE_DATE} (tag: ${LAST_TAG})"

          DEVELOP_PRS=$(gh pr list --base develop --state merged --limit 100 \
            --json number,title,author,mergedAt,headRefName \
            --jq "[.[] | select(.mergedAt > \"${SINCE_DATE}\")]")

          MASTER_PRS=$(gh pr list --base master --state merged --limit 100 \
            --json number,title,author,mergedAt,headRefName \
            --jq "[.[] | select(.mergedAt > \"${SINCE_DATE}\" and .headRefName != \"develop\")]")

          PR_JSON=$(echo "${DEVELOP_PRS}${MASTER_PRS}" | jq -s 'add | unique_by(.number) | sort_by(.mergedAt)')

          PR_COUNT=$(echo "$PR_JSON" | jq 'length')
          echo "Found ${PR_COUNT} PRs"

          AUTHORS=$(echo "$PR_JSON" | jq -r '.[].author.login' | sort -u)

          GROUPED_NOTES=""
          PR_SUMMARY=""
          for AUTHOR in $AUTHORS; do
            GROUPED_NOTES+="### @${AUTHOR}\n"
            while IFS='|' read -r NUM TITLE BRANCH; do
              GROUPED_NOTES+="- #${NUM} ${TITLE}"
              JIRA_KEY=$(echo "$BRANCH" | grep -oE '[A-Z]+-[0-9]+' | head -1)
              if [ -n "$JIRA_KEY" ]; then
                GROUPED_NOTES+=" (${JIRA_KEY})"
              fi
              GROUPED_NOTES+="\n"
              PR_SUMMARY+="• #${NUM} ${TITLE} (by ${AUTHOR})\n"
            done < <(echo "$PR_JSON" | jq -r ".[] | select(.author.login == \"${AUTHOR}\") | \"\(.number)|\(.title)|\(.headRefName)\"")
            GROUPED_NOTES+="\n"
          done

          echo "grouped_notes<<EOFNOTES" >> "$GITHUB_OUTPUT"
          echo -e "$GROUPED_NOTES" >> "$GITHUB_OUTPUT"
          echo "EOFNOTES" >> "$GITHUB_OUTPUT"

          echo "pr_summary<<EOFSUMMARY" >> "$GITHUB_OUTPUT"
          echo -e "$PR_SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOFSUMMARY" >> "$GITHUB_OUTPUT"

          AUTHOR_COUNT=$(echo "$AUTHORS" | wc -w | tr -d ' ')
          echo "pr_count=${PR_COUNT}" >> "$GITHUB_OUTPUT"
          echo "author_count=${AUTHOR_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          ISSUE_KEYS: ${{ steps.issues.outputs.keys }}
          JIRA_VERSIONS: ${{ steps.jira_release.outputs.version_names }}
          RELEASE_ISSUE_COUNT: ${{ steps.release_issues.outputs.release_issue_count }}
          PR_COUNT: ${{ steps.prs.outputs.pr_count }}
          AUTHOR_COUNT: ${{ steps.prs.outputs.author_count }}
          GROUPED_NOTES: ${{ steps.prs.outputs.grouped_notes }}
          RELEASE_ISSUES_MD: ${{ steps.release_issues.outputs.release_issues_md }}
        run: |
          NOTES="## Release Summary\n\n"
          NOTES+="**PRs:** ${PR_COUNT} | **Contributors:** ${AUTHOR_COUNT}"
          if [ -n "$JIRA_VERSIONS" ]; then
            NOTES+=" | **Jira Release:** ${JIRA_VERSIONS}"
          fi
          if [ -n "$RELEASE_ISSUE_COUNT" ] && [ "$RELEASE_ISSUE_COUNT" -gt 0 ] 2>/dev/null; then
            NOTES+=" | **Issues:** ${RELEASE_ISSUE_COUNT}"
          fi
          NOTES+="\n\n"
          NOTES+="## Changes by Developer\n\n"
          NOTES+="${GROUPED_NOTES}\n"

          if [ -n "$RELEASE_ISSUES_MD" ]; then
            NOTES+="## Release Contents (${JIRA_VERSIONS})\n\n"
            NOTES+="${RELEASE_ISSUES_MD}\n"
          elif [ -n "$ISSUE_KEYS" ]; then
            NOTES+="## Jira Issues\n\n"
            for KEY in $ISSUE_KEYS; do
              NOTES+="- [${KEY}](${JIRA_BASE_URL}/browse/${KEY})\n"
            done
          fi

          NOTES+="\n**Deployed:** ${RELEASE_DATE}"

          if git rev-parse "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists locally, updating..."
            git tag -d "${RELEASE_TAG}"
          fi
          git tag "${RELEASE_TAG}"

          if git ls-remote --tags origin "refs/tags/${RELEASE_TAG}" | grep -q "${RELEASE_TAG}"; then
            echo "::warning::Tag ${RELEASE_TAG} already exists on remote, updating..."
            git push origin "${RELEASE_TAG}" --force
          else
            git push origin "${RELEASE_TAG}"
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists, updating..."
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TAG} (${RELEASE_DATE})" \
              --notes "$(echo -e "$NOTES")" \
              --latest
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TAG} (${RELEASE_DATE})" \
              --notes "$(echo -e "$NOTES")" \
              --latest
          fi

          echo "### GitHub Release Created" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** ${RELEASE_TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **PRs:** ${PR_COUNT}" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack - Production release
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.RELEASE_SLACK_WEBHOOK_URL }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          ISSUE_KEYS: ${{ steps.issues.outputs.keys }}
          JOB_STATUS: ${{ job.status }}
          PR_COUNT: ${{ steps.prs.outputs.pr_count }}
          AUTHOR_COUNT: ${{ steps.prs.outputs.author_count }}
          PR_SUMMARY: ${{ steps.prs.outputs.pr_summary }}
          RELEASE_ISSUES_SLACK: ${{ steps.release_issues.outputs.release_issues_slack }}
          REPO_NAME: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          IST_TIME=$(TZ='Asia/Kolkata' date "+%b %d, %Y %I:%M %p IST")
          UTC_TIME=$(date -u "+%b %d, %Y %I:%M %p UTC")

          if [ "$JOB_STATUS" = "success" ]; then
            HEADER="Release Deployed to Production"
            STATUS_TEXT="SUCCESS"
            URGENCY="Deployment completed successfully!"
          else
            HEADER="Release Deployment Failed"
            STATUS_TEXT="FAILED"
            URGENCY="Deployment encountered errors. Check GitHub Actions."
          fi

          JIRA_LINKS=""
          if [ -n "$ISSUE_KEYS" ]; then
            for KEY in $ISSUE_KEYS; do
              JIRA_LINKS+="<${JIRA_BASE_URL}/browse/${KEY}|${KEY}> "
            done
          else
            JIRA_LINKS="None"
          fi

          if [ -z "$PR_SUMMARY" ]; then
            PR_SUMMARY="No PRs found"
          fi
          if [ -z "$RELEASE_ISSUES_SLACK" ]; then
            RELEASE_ISSUES_SLACK="No issues found"
          fi

          REPO_URL="https://github.com/${REPO_NAME}"
          RELEASE_URL="${REPO_URL}/releases/tag/${RELEASE_TAG}"

          REPO_FIELD=$(printf '*Repository:*\n<%s|%s>' "$REPO_URL" "$REPO_NAME")
          VERSION_FIELD=$(printf '*Release Version:*\n`%s`' "$RELEASE_TAG")
          COMMIT_FIELD=$(printf '*Commit:*\n`%s`' "$SHORT_SHA")
          TRIGGER_FIELD=$(printf '*Triggered by:*\n%s' "$ACTOR")
          STATUS_FIELD=$(printf '*Status:*\n`%s`' "$STATUS_TEXT")
          JIRA_FIELD=$(printf '*Jira Issues:*\n%s' "$JIRA_LINKS")
          SUMMARY_TEXT=$(printf '*Release Summary: %s PRs from %s contributors*\n\n%s' "$PR_COUNT" "$AUTHOR_COUNT" "$PR_SUMMARY")
          CONTENTS_TEXT=$(printf '*Release Contents (%s):*\n\n%s' "$RELEASE_TAG" "$RELEASE_ISSUES_SLACK")

          PAYLOAD=$(jq -n \
            --arg header "$HEADER" \
            --arg urgency "*${URGENCY}*" \
            --arg repo_field "$REPO_FIELD" \
            --arg version_field "$VERSION_FIELD" \
            --arg commit_field "$COMMIT_FIELD" \
            --arg trigger_field "$TRIGGER_FIELD" \
            --arg status_field "$STATUS_FIELD" \
            --arg jira_field "$JIRA_FIELD" \
            --arg summary "$SUMMARY_TEXT" \
            --arg contents "$CONTENTS_TEXT" \
            --arg context "${IST_TIME}  |  ${UTC_TIME}  |  Run #${RUN_NUMBER}" \
            --arg release_url "$RELEASE_URL" \
            '{blocks:[
              {type:"header",text:{type:"plain_text",text:$header}},
              {type:"section",text:{type:"mrkdwn",text:$urgency}},
              {type:"divider"},
              {type:"section",fields:[
                {type:"mrkdwn",text:$repo_field},
                {type:"mrkdwn",text:$version_field},
                {type:"mrkdwn",text:$commit_field},
                {type:"mrkdwn",text:$trigger_field},
                {type:"mrkdwn",text:$status_field},
                {type:"mrkdwn",text:$jira_field}
              ]},
              {type:"divider"},
              {type:"section",text:{type:"mrkdwn",text:$summary}},
              {type:"divider"},
              {type:"section",text:{type:"mrkdwn",text:$contents}},
              {type:"divider"},
              {type:"context",elements:[{type:"mrkdwn",text:$context}]},
              {type:"actions",elements:[{type:"button",text:{type:"plain_text",text:"GitHub Release"},url:$release_url}]}
            ]}')

          curl -s -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$SLACK_WEBHOOK_URL"

  # ============================================================
  # ON WORKFLOW DISPATCH: Move subtasks to Production
  # ============================================================
  on-deploy-prod:
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy_env == 'production'
    runs-on: ubuntu-latest
    steps:
      - name: Move subtasks to Production then Done, check parent completion
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          PRODUCTION_TRANSITION_ID: ${{ vars.JIRA_TRANSITION_PRODUCTION }}
          SUBTASK_KEYS: ${{ github.event.inputs.subtask_keys }}
        run: |
          if [ -z "$SUBTASK_KEYS" ]; then
            echo "No subtask keys provided. Nothing to do."
            exit 0
          fi

          echo "Releasing subtasks: $SUBTASK_KEYS"

          PARENT_KEYS=""

          IFS=',' read -ra KEYS <<< "$SUBTASK_KEYS"

          for KEY in "${KEYS[@]}"; do
            KEY=$(echo "$KEY" | xargs)
            [ -z "$KEY" ] && continue

            if ! echo "$KEY" | grep -qE '^[A-Z]+-[0-9]+$'; then
              echo "  -> Skipping invalid key: $KEY"
              continue
            fi

            echo "--- $KEY ---"

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"transition\":{\"id\":\"$PRODUCTION_TRANSITION_ID\"}}" \
              "$JIRA_BASE_URL/rest/api/3/issue/$KEY/transitions")

            if [ "$HTTP_CODE" = "204" ]; then
              echo "  -> $KEY -> Production (manual Done required)"
            else
              echo "  -> $KEY -> Production failed (HTTP $HTTP_CODE)"
            fi
          done
