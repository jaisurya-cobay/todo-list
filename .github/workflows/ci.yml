name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          # Check that index.html is well-formed
          if ! python3 -c "
          import html.parser, sys
          parser = html.parser.HTMLParser()
          with open('index.html') as f:
              parser.feed(f.read())
          print('HTML parsed successfully')
          "; then
            echo "::error::HTML validation failed"
            exit 1
          fi

      - name: Check JS syntax
        run: |
          node --check app.js
          echo "JavaScript syntax OK"

      - name: Check for common issues
        run: |
          # No console.log left in production code
          if grep -n 'console\.log' app.js; then
            echo "::warning::console.log statements found in app.js"
          fi

          # Check for TODO/FIXME/HACK comments
          if grep -rn 'TODO\|FIXME\|HACK' app.js index.html styles.css; then
            echo "::warning::Found TODO/FIXME/HACK comments"
          fi

          echo "Checks complete"
