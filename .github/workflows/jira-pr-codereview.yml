name: Jira - PR Opened → Review

on:
  pull_request:
    types: [opened, reopened]
    branches: [develop]

concurrency:
  group: jira-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  transition-to-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo for commit history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Jira subtask keys from PR and commits
        id: issues
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          PARENT_KEY=$(echo "$BRANCH" | grep -oE '[A-Z]+-[0-9]+' | head -1)

          # Get commit messages from the PR branch
          COMMIT_MSGS=$(git log origin/develop..HEAD --format=%s 2>/dev/null || echo "")
          ALL_TEXT="${PR_TITLE} ${PR_BODY} ${COMMIT_MSGS}"
          KEYS=$(echo "$ALL_TEXT" | grep -oE '[A-Z]+-[0-9]+' | sort -u | tr '\n' ' ')

          if [ -z "$KEYS" ]; then
            echo "No Jira issue keys found. Skipping."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found issue keys: ${KEYS}"
            echo "keys=${KEYS}" >> "$GITHUB_OUTPUT"
            echo "parent_key=${PARENT_KEY}" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Transition referenced issues to Review
        if: steps.issues.outputs.found == 'true'
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          REVIEW_TRANSITION_ID: ${{ vars.JIRA_TRANSITION_REVIEW }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          ISSUE_KEYS: ${{ steps.issues.outputs.keys }}
        run: |
          for KEY in $ISSUE_KEYS; do
            echo "Processing ${KEY}..."

            SUBTASK_COUNT=$(curl -s -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}?fields=subtasks" \
              | jq '.fields.subtasks | length // 0')

            if [ "$SUBTASK_COUNT" -gt 0 ] 2>/dev/null; then
              echo "  Skipping ${KEY} (parent with subtasks)"
              continue
            fi

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -X POST \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}/transitions" \
              -d "{\"transition\":{\"id\":\"${REVIEW_TRANSITION_ID}\"}}")

            if [ "$HTTP_CODE" = "204" ]; then
              echo "  -> ${KEY} → Review"
            else
              echo "  -> ${KEY} failed (HTTP ${HTTP_CODE})"
            fi

            COMMENT_BODY=$(jq -n \
              --arg pr "PR #${PR_NUM} opened by ${AUTHOR}" \
              --arg title "Title: ${PR_TITLE}" \
              --arg url "URL: ${PR_URL}" \
              --arg status "Status: Review" \
              '{body:{type:"doc",version:1,content:[{type:"paragraph",content:[{type:"text",text:$pr},{type:"hardBreak"},{type:"text",text:$title},{type:"hardBreak"},{type:"text",text:$url},{type:"hardBreak"},{type:"text",text:$status}]}]}}')

            curl -s -o /dev/null \
              -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -X POST \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}/comment" \
              -d "$COMMENT_BODY"
          done

          echo "### Jira Issues → Review" >> "$GITHUB_STEP_SUMMARY"
          echo "Issues: ${ISSUE_KEYS}" >> "$GITHUB_STEP_SUMMARY"
