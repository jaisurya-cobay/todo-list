name: Jira - PR Opened → Code Review

on:
  pull_request:
    types: [opened, reopened]
    branches: [develop]

concurrency:
  group: jira-codereview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  transition-to-code-review:
    runs-on: ubuntu-latest
    steps:
      - name: Extract Jira keys and determine mode
        id: issues
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          PARENT_KEY=$(echo "$BRANCH" | grep -oE '[A-Z]+-[0-9]+' | head -1)
          echo "Parent key (from branch): ${PARENT_KEY}"

          ALL_TEXT="${PR_TITLE} ${PR_BODY} ${BRANCH}"
          ALL_KEYS=$(echo "$ALL_TEXT" | grep -oE '[A-Z]+-[0-9]+' | sort -u)

          SUBTASK_KEYS=""
          for KEY in $ALL_KEYS; do
            if [ "$KEY" != "$PARENT_KEY" ]; then
              SUBTASK_KEYS+="${KEY} "
            fi
          done

          if [ -n "$SUBTASK_KEYS" ]; then
            echo "Mode: subtask (found: ${SUBTASK_KEYS})"
            echo "mode=subtask" >> "$GITHUB_OUTPUT"
            echo "keys=${SUBTASK_KEYS}" >> "$GITHUB_OUTPUT"
          elif [ -n "$PARENT_KEY" ]; then
            echo "Mode: parent-only (${PARENT_KEY})"
            echo "mode=parent" >> "$GITHUB_OUTPUT"
            echo "keys=${PARENT_KEY}" >> "$GITHUB_OUTPUT"
          else
            echo "No Jira keys found. Skipping."
            echo "mode=none" >> "$GITHUB_OUTPUT"
          fi

          echo "parent_key=${PARENT_KEY}" >> "$GITHUB_OUTPUT"

      - name: Transition issues to Code Review
        if: steps.issues.outputs.mode != 'none'
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          CODE_REVIEW_TRANSITION_ID: ${{ vars.JIRA_TRANSITION_CODE_REVIEW || '61' }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          MODE="${{ steps.issues.outputs.mode }}"

          for KEY in ${{ steps.issues.outputs.keys }}; do
            echo "Processing ${KEY} (${MODE} mode)..."

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -X POST \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}/transitions" \
              -d "{\"transition\":{\"id\":\"${CODE_REVIEW_TRANSITION_ID}\"}}")

            if [ "$HTTP_CODE" = "204" ]; then
              echo "  -> ${KEY} transitioned to Code Review"
            else
              echo "  -> ${KEY} transition failed (HTTP ${HTTP_CODE})"
            fi

            curl -s -o /dev/null \
              -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -X POST \
              "${JIRA_BASE_URL}/rest/api/3/issue/${KEY}/comment" \
              -d "{\"body\":{\"type\":\"doc\",\"version\":1,\"content\":[{\"type\":\"paragraph\",\"content\":[{\"type\":\"text\",\"text\":\"PR #${PR_NUM} opened by ${AUTHOR}\"},{\"type\":\"hardBreak\"},{\"type\":\"text\",\"text\":\"Title: ${PR_TITLE}\"},{\"type\":\"hardBreak\"},{\"type\":\"text\",\"text\":\"URL: ${PR_URL}\"},{\"type\":\"hardBreak\"},{\"type\":\"text\",\"text\":\"Status: Code Review\"}]}]}}"
          done

          echo "### Issues → Code Review (${MODE} mode)" >> "$GITHUB_STEP_SUMMARY"
          echo "Issues: ${{ steps.issues.outputs.keys }}" >> "$GITHUB_STEP_SUMMARY"
