name: Weekly Jira Pipeline Report

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday 9 AM UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  pipeline-report:
    runs-on: ubuntu-latest
    env:
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY || 'XPRMNTS' }}
    steps:
      - name: Current pipeline snapshot
        run: |
          echo "# Jira Pipeline Report - $(date +%Y-%m-%d)" > report.md
          echo "" >> report.md
          echo "## Current Board Snapshot" >> report.md
          echo "" >> report.md
          echo "| Status | Count | Tickets |" >> report.md
          echo "|--------|-------|---------|" >> report.md

          for STATUS in "To Do" "In Progress" "Review" "Staging" "Prod" "Done"; do
            ENCODED=$(echo "$STATUS" | sed 's/ /%20/g')
            RESPONSE=$(curl -s -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "${JIRA_BASE_URL}/rest/api/3/search?jql=project%3D${JIRA_PROJECT_KEY}%20AND%20status%3D%22${ENCODED}%22&fields=summary,assignee&maxResults=50")

            COUNT=$(echo "$RESPONSE" | jq '.total // 0')
            TICKETS=$(echo "$RESPONSE" | jq -r '[.issues[] | "\(.key): \(.fields.summary)"] | join(", ")' 2>/dev/null || echo "")

            if [ -z "$TICKETS" ]; then
              TICKETS="-"
            fi

            echo "| **${STATUS}** | ${COUNT} | ${TICKETS} |" >> report.md
          done

          echo "" >> report.md

      - name: Weekly throughput
        run: |
          echo "## Weekly Throughput (Last 7 Days)" >> report.md
          echo "" >> report.md
          echo "| Transition | Count | Tickets |" >> report.md
          echo "|-----------|-------|---------|" >> report.md

          for STATUS in "In Progress" "Review" "Staging" "Prod" "Done"; do
            ENCODED=$(echo "$STATUS" | sed 's/ /%20/g')
            RESPONSE=$(curl -s -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "${JIRA_BASE_URL}/rest/api/3/search?jql=project%3D${JIRA_PROJECT_KEY}%20AND%20status%20changed%20to%20%22${ENCODED}%22%20after%20-7d&fields=summary&maxResults=50")

            COUNT=$(echo "$RESPONSE" | jq '.total // 0')
            KEYS=$(echo "$RESPONSE" | jq -r '[.issues[].key] | join(", ")' 2>/dev/null || echo "-")
            echo "| → ${STATUS} | ${COUNT} | ${KEYS} |" >> report.md
          done

          # Created this week
          CREATED=$(curl -s -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${JIRA_BASE_URL}/rest/api/3/search?jql=project%3D${JIRA_PROJECT_KEY}%20AND%20created%20>%3D%20-7d&fields=summary&maxResults=50")
          CREATED_COUNT=$(echo "$CREATED" | jq '.total // 0')
          CREATED_KEYS=$(echo "$CREATED" | jq -r '[.issues[].key] | join(", ")' 2>/dev/null || echo "-")
          echo "| Created (new) | ${CREATED_COUNT} | ${CREATED_KEYS} |" >> report.md
          echo "" >> report.md

      - name: Cycle time analysis
        run: |
          echo "## Cycle Time (Completed Last 7 Days)" >> report.md
          echo "" >> report.md

          DONE_ISSUES=$(curl -s -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${JIRA_BASE_URL}/rest/api/3/search?jql=project%3D${JIRA_PROJECT_KEY}%20AND%20status%20changed%20to%20%22Done%22%20after%20-7d&fields=summary,created&maxResults=50&expand=changelog")

          ISSUE_COUNT=$(echo "$DONE_ISSUES" | jq '.total // 0')

          if [ "$ISSUE_COUNT" -gt 0 ]; then
            echo "| Ticket | Summary | Created | Completed | Days |" >> report.md
            echo "|--------|---------|---------|-----------|------|" >> report.md

            echo "$DONE_ISSUES" | jq -r '.issues[] | {
              key: .key,
              summary: .fields.summary,
              created: .fields.created,
              done_date: ([.changelog.histories[] | select(.items[] | .toString == "Done") | .created] | last)
            } | "\(.key)|\(.summary)|\(.created[:10])|\(.done_date[:10] // "N/A")|\( if .done_date then (((.done_date | fromdateiso8601) - (.created | fromdateiso8601)) / 86400 | floor) else "N/A" end )"' 2>/dev/null | while IFS='|' read -r KEY SUMMARY CREATED DONE_DATE DAYS; do
              echo "| ${KEY} | ${SUMMARY} | ${CREATED} | ${DONE_DATE} | ${DAYS} |" >> report.md
            done

            AVG_DAYS=$(echo "$DONE_ISSUES" | jq '[.issues[] | {
              created: .fields.created,
              done_date: ([.changelog.histories[] | select(.items[] | .toString == "Done") | .created] | last)
            } | select(.done_date) | (((.done_date | fromdateiso8601) - (.created | fromdateiso8601)) / 86400)] | if length > 0 then (add / length | floor) else 0 end' 2>/dev/null || echo "N/A")

            echo "" >> report.md
            echo "**Average Cycle Time:** ${AVG_DAYS} days" >> report.md
          else
            echo "No tickets completed this week." >> report.md
          fi

          echo "" >> report.md

      - name: Bottleneck detection
        run: |
          echo "## Bottleneck Alert" >> report.md
          echo "" >> report.md

          BOTTLENECK_FOUND=false

          for STATUS in "In Progress" "Review" "Staging" "Prod"; do
            ENCODED=$(echo "$STATUS" | sed 's/ /%20/g')
            STUCK=$(curl -s -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "${JIRA_BASE_URL}/rest/api/3/search?jql=project%3D${JIRA_PROJECT_KEY}%20AND%20status%3D%22${ENCODED}%22%20AND%20status%20changed%20to%20%22${ENCODED}%22%20before%20-3d&fields=summary,assignee&maxResults=50")

            STUCK_COUNT=$(echo "$STUCK" | jq '.total // 0')
            if [ "$STUCK_COUNT" -gt 0 ]; then
              STUCK_KEYS=$(echo "$STUCK" | jq -r '[.issues[] | "\(.key) (\(.fields.assignee.displayName // "unassigned"))"] | join(", ")' 2>/dev/null || echo "")
              echo "- **${STATUS}** (${STUCK_COUNT} stuck >3 days): ${STUCK_KEYS}" >> report.md
              BOTTLENECK_FOUND=true
            fi
          done

          if [ "$BOTTLENECK_FOUND" = "false" ]; then
            echo "No bottlenecks detected." >> report.md
          fi

          echo "" >> report.md

      - name: Output report
        run: |
          cat report.md
          cat report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub issue with report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          gh issue create \
            --title "Pipeline Report - ${DATE}" \
            --body "$(cat report.md)" \
            --label "report" \
            --repo "${{ github.repository }}" 2>/dev/null || echo "Note: 'report' label may need to be created"
