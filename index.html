<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div class="brand">
          <h1>TODO</h1>
          <p class="subtitle">Simple, fast, offline-friendly.</p>
        </div>
      </header>

      <section class="card" aria-label="Todo app">
        <form id="create-form" class="create" autocomplete="off">
          <label class="sr-only" for="new-todo">Add a todo</label>
          <input
            id="new-todo"
            name="new-todo"
            type="text"
            inputmode="text"
            placeholder="Add a task…"
            maxlength="200"
            required
          />
          <button type="submit" class="btn primary">Add</button>
        </form>

        <div class="toolbar" role="region" aria-label="Todo controls">
          <div class="filters" role="tablist" aria-label="Filters">
            <button type="button" class="chip" data-filter="all" aria-pressed="true">
              All
            </button>
            <button type="button" class="chip" data-filter="active" aria-pressed="false">
              Active
            </button>
            <button type="button" class="chip" data-filter="completed" aria-pressed="false">
              Completed
            </button>
          </div>

          <div class="actions">
            <button type="button" id="toggle-all" class="btn ghost" title="Toggle all">
              Toggle all
            </button>
            <button type="button" id="clear-completed" class="btn ghost" title="Clear completed">
              Clear completed
            </button>
          </div>
        </div>

        <div class="meta" aria-live="polite">
          <span id="count"></span>
          <span class="sep">·</span>
          <span id="hint" class="hint">Tip: double-click a todo to edit. Enter to save, Esc to cancel.</span>
        </div>

        <ul id="list" class="list" aria-label="Todo list"></ul>

        <template id="todo-item-template">
          <li class="item" data-id="">
            <label class="checkbox">
              <input type="checkbox" class="toggle" />
              <span aria-hidden="true" class="box"></span>
            </label>

            <div class="content">
              <div class="title" role="button" tabindex="0"></div>
              <input class="edit" type="text" maxlength="200" />
            </div>

            <button type="button" class="icon danger" data-action="delete" aria-label="Delete todo">
              ×
            </button>
          </li>
        </template>
      </section>

      <footer class="footer">
        <span>Data stays in your browser (localStorage).</span>
      </footer>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
